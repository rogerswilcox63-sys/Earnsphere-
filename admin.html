<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarnSphereHub Admin</title>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body{font-family:'Inter',sans-serif; background:#0a0a0a; color:white; padding:15px}
.login-box{max-width:400px; margin:100px auto; background:#1e293b; padding:30px; border-radius:12px}
input,button{width:100%; padding:12px; margin:8px 0; border-radius:8px; border:1px solid #334155; background:#0f172a; color:white}
button{background:#f59e0b; border:none; font-weight:700; cursor:pointer}
h1{color:#f59e0b; text-align:center}
.tabs{display:flex; gap:10px; margin-bottom:20px}
.tab{padding:10px 15px; background:#1e293b; border-radius:12px; cursor:pointer}
.tab.active{background:#f59e0b; color:#0a0a0a; font-weight:700}
.card{background:#1e293b; padding:15px; border-radius:12px; margin-bottom:12px; border-left:4px solid #f59e0b}
.btn{padding:8px 12px; border:none; border-radius:6px; cursor:pointer; margin-right:8px; font-weight:600}
.approve{background:#22c55e; color:white}
.decline{background:#ef4444; color:white}
.small{font-size:12px; color:#94a3b8}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-box">
  <h1><i class="fas fa-shield-alt"></i> Admin Login</h1>
  <input type="email" id="adminEmail" placeholder="Admin Email" value="wilcoxrichard85@gmail.com">
  <input type="password" id="adminPass" placeholder="Password">
  <button onclick="adminLogin()">Login</button>
  <p id="loginMsg" style="color:#ef4444; text-align:center"></p>
</div>

<!-- ADMIN DASHBOARD -->
<div id="adminPanel" style="display:none">
  <h1><i class="fas fa-shield-alt"></i> EarnSphereHub Admin 
    <button onclick="logout()" style="float:right; width:auto; padding:8px 12px; background:#ef4444">Logout</button>
  </h1>

  <div class="tabs">
    <div class="tab active" onclick="showTab('withdrawals', this)">Withdrawals</div>
    <div class="tab" onclick="showTab('transactions', this)">Transactions</div>
  </div>

  <div id="withdrawals"></div>
  <div id="transactions" style="display:none"></div>
</div>

<!-- PLACE AT THE BOTTOM OF admin.html -->
<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getFirestore, collection, query, where, getDocs, doc, updateDoc, increment } from "https://gstatic.com";
    import { getAuth, onAuthStateChanged } from "https://gstatic.com";

    // Insert your unique Firebase Project credentials object here
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "://firebaseapp.com",
        projectId: "earnspherehub",
        storageBucket: "://appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // RESTRICT ACCESS TO YOUR ADMIN EMAIL ONLY
    onAuthStateChanged(auth, (user) => {
        if (!user || user.email !== "wilcoxrichard85@gmail.com") {
            alert("⛔ Access Denied: Unauthorized Admin Session.");
            window.location.href = "dashboard.html";
        } else {
            loadPendingCashouts();
        }
    });

    // FETCH PENDING RECORDS FROM THE WITHDRAWALS COLLECTION
    async function loadPendingCashouts() {
        // Target whatever container ID or element you hold your withdrawals layout in
        const container = document.getElementById('withdrawals-list-container') || document.body;
        
        try {
            const q = query(collection(db, "withdrawals"), where("status", "==", "Pending Review"));
            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                container.innerHTML = "<p style='color:#94a3b8; text-align:center;'>No pending withdrawals found.</p>";
                return;
            }

            container.innerHTML = ""; // Clear loader text
            querySnapshot.forEach((withdrawalDoc) => {
                const data = withdrawalDoc.data();
                const docId = withdrawalDoc.id;

                container.innerHTML += `
                    <div id="row-${docId}" style="background:#1e293b; padding:16px; border-radius:8px; margin-bottom:12px; border:1px solid #334155;">
                        <p style="color:#ffffff; font-weight:600;">${data.userEmail}</p>
                        <p style="color:#94a3b8; font-size:0.85rem;">${data.bankName} • ${data.accountNumber}</p>
                        <p style="color:#4ade80; font-weight:700; margin-top:4px;">₦${data.amount}</p>
                        <div style="margin-top:10px; display:flex; gap:10px;">
                            <button onclick="approvePayout('${docId}', '${data.userId}', ${data.amount})" style="background:#16a34a; border:none; color:white; padding:6px 12px; border-radius:4px; cursor:pointer;">Approve</button>
                            <button onclick="rejectPayout('${docId}')" style="background:#dc2626; border:none; color:white; padding:6px 12px; border-radius:4px; cursor:pointer;">Reject</button>
                        </div>
                    </div>
                `;
            });
        } catch(err) {
            console.error(err);
        }
    }

    // MAP ACTIONS GLOBAL TO THE WINDOW FOR BUTTON CLICK LIFECYCLES
    window.approvePayout = async function(docId, userId, amount) {
        if(!confirm("Approve this payout? This will deduct balance on the server.")) return;
        try {
            await updateDoc(doc(db, "withdrawals", docId), { status: "Approved" });
            await updateDoc(doc(db, "users", userId), { wallet_balance: increment(-amount) });
            document.getElementById(`row-${docId}`).remove();
            alert("Payout approved and balance deducted successfully!");
        } catch(e) { alert("Error updating records."); }
    };

    window.rejectPayout = async function(docId) {
        if(!confirm("Reject this payout?")) return;
        try {
            await updateDoc(doc(db, "withdrawals", docId), { status: "Rejected" });
            document.getElementById(`row-${docId}`).remove();
            alert("Payout rejected.");
        } catch(e) { alert("Error rejecting payout."); }
    };
</script>

</body>
</html>
