<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarnSphereHub Admin</title>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body{font-family:'Inter',sans-serif; background:#0a0a0a; color:white; padding:15px}
.login-box{max-width:400px; margin:100px auto; background:#1e293b; padding:30px; border-radius:12px}
input,button{width:100%; padding:12px; margin:8px 0; border-radius:8px; border:1px solid #334155; background:#0f172a; color:white}
button{background:#f59e0b; border:none; font-weight:700; cursor:pointer}
h1{color:#f59e0b; text-align:center}
.tabs{display:flex; gap:10px; margin-bottom:20px}
.tab{padding:10px 15px; background:#1e293b; border-radius:12px; cursor:pointer}
.tab.active{background:#f59e0b; color:#0a0a0a; font-weight:700}
.card{background:#1e293b; padding:15px; border-radius:12px; margin-bottom:12px; border-left:4px solid #f59e0b}
.btn{padding:8px 12px; border:none; border-radius:6px; cursor:pointer; margin-right:8px; font-weight:600}
.approve{background:#22c55e; color:white}
.decline{background:#ef4444; color:white}
.small{font-size:12px; color:#94a3b8}
</style>
</head>
<body>

<div id="loginScreen" class="login-box" style="display:none">
  <h1><i class="fas fa-shield-alt"></i> Admin Login</h1>
  <input type="email" id="adminEmail" placeholder="Admin Email" value="wilcoxrichard85@gmail.com">
  <input type="password" id="adminPass" placeholder="Password">
  <button onclick="adminLogin()">Login</button>
  <p id="loginMsg" style="color:#ef4444; text-align:center"></p>
</div>

<div id="adminPanel" style="display:none">
  <h1><i class="fas fa-shield-alt"></i> EarnSphereHub Admin 
    <button onclick="logout()" style="float:right; width:auto; padding:8px 12px; background:#ef4444">Logout</button>
  </h1>

  <div class="tabs">
    <div class="tab active" onclick="showTab('withdrawals', this)">Withdrawals</div>
    <div class="tab" onclick="showTab('transactions', this)">Transactions</div>
  </div>

  <div id="withdrawals">
    <div id="withdrawals-list-container"></div>
  </div>
  
  <div id="transactions" style="display:none">
    <div id="transactions-list-container"></div>
  </div>
</div>

<script>
    // ============================================
    // FIREBASE INITIALIZATION
    // ============================================
    const firebaseConfig = {
      apiKey: "AIzaSyCVExwvLDwVmMJ6XbyTCrY1IyMqyhiuLbo",
      authDomain: "earnspherehub-742e9.firebaseapp.com",
      projectId: "earnspherehub-742e9",
      storageBucket: "earnspherehub-742e9.firebasestorage.app",
      messagingSenderId: "173538573377",
      appId: "1:173538573377:web:6d8c748376afcb9096dac0",
      measurementId: "G-3ZXY33620J"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const ALLOWED_ADMIN_EMAIL = "wilcoxrichard85@gmail.com";

    // ============================================
    // AUTH MONITOR STATE
    // ============================================
    auth.onAuthStateChanged((user) => {
        console.log("Auth state changed. User object:", user);
        
        if (user) {
            if (user.email === ALLOWED_ADMIN_EMAIL) {
                console.log("✅ Admin authorized. Opening panel...");
                document.getElementById("loginScreen").style.display = "none";
                document.getElementById("adminPanel").style.display = "block";
                loadPendingCashouts();
                loadAllTransactions();
            } else {
                console.warn("⛔ Unauthorized email tried to access admin panel:", user.email);
                alert("⛔ Access Denied: Unauthorized Admin Account.");
                auth.signOut().then(() => {
                    window.location.href = "dashboard.html";
                });
            }
        } else {
            console.log("No user detected. Showing login screen.");
            document.getElementById("loginScreen").style.display = "block";
            document.getElementById("adminPanel").style.display = "none";
        }
    });

    // ============================================
    // LOGIN & LOGOUT FUNCTIONALITY
    // ============================================
    async function adminLogin() {
        const email = document.getElementById("adminEmail").value.trim();
        const pass = document.getElementById("adminPass").value;
        const msg = document.getElementById("loginMsg");

        if (email !== ALLOWED_ADMIN_EMAIL) {
            msg.innerText = "Error: Invalid admin account routing parameters.";
            return;
        }

        try {
            msg.innerText = "Authenticating Admin...";
            await auth.signInWithEmailAndPassword(email, pass);
        } catch (error) {
            console.error("Login error:", error);
            msg.innerText = "Login Failed: " + error.message;
        }
    }

    function logout() {
        auth.signOut().then(() => {
            window.location.reload();
        });
    }

    // ============================================
    // TAB MANAGEMENT SWITCHER
    // ============================================
    function showTab(tabId, element) {
        document.getElementById("withdrawals").style.display = tabId === "withdrawals" ? "block" : "none";
        document.getElementById("transactions").style.display = tabId === "transactions" ? "block" : "none";

        document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
        element.classList.add("active");
    }

    // ============================================
    // DATA LAYER (FIRESTORE)
    // ============================================
    async function loadPendingCashouts() {
        const container = document.getElementById('withdrawals-list-container');
        if (!container) return;
        
        container.innerHTML = "<p style='color:#94a3b8; text-align:center;'>Loading pending records...</p>";

        try {
            db.collection("withdrawals")
              .where("status", "==", "Pending Review")
              .onSnapshot((querySnapshot) => {
                  if (querySnapshot.empty) {
                      container.innerHTML = "<p style='color:#94a3b8; text-align:center;'>No pending withdrawals found.</p>";
                      return;
                  }

                  container.innerHTML = "";
                  querySnapshot.forEach((doc) => {
                      const data = doc.data();
                      const docId = doc.id;

                      container.innerHTML += `
                          <div id="row-${docId}" style="background:#1e293b; padding:16px; border-radius:8px; margin-bottom:12px; border:1px solid #334155;">
                              <p style="color:#ffffff; font-weight:600;">${data.userEmail || 'Unknown Account'}</p>
                              <p style="color:#94a3b8; font-size:0.85rem;">${data.bankName || 'N/A'} • ${data.accountNumber || 'N/A'}</p>
                              <p style="color:#4ade80; font-weight:700; margin-top:4px;">₦${(data.amount || 0).toLocaleString()}</p>
                              <div style="margin-top:10px; display:flex; gap:10px;">
                                  <button onclick="approvePayout('${docId}', '${data.userId}', ${data.amount})" style="background:#16a34a; border:none; color:white; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:600; width:auto; margin:0;">Approve</button>
                                  <button onclick="rejectPayout('${docId}')" style="background:#dc2626; border:none; color:white; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:600; width:auto; margin:0;">Reject</button>
                              </div>
                          </div>
                      `;
                  });
              }, (error) => {
                  console.error("Snapshot error:", error);
                  container.innerHTML = "<p style='color:#ef4444; text-align:center;'>Firestore rule block or database offline.</p>";
              });
        } catch(err) {
            console.error("Error reading data logs:", err);
        }
    }

    async function loadAllTransactions() {
        const container = document.getElementById('transactions-list-container');
        if (!container) return;

        try {
            db.collection("withdrawals")
              .limit(30)
              .onSnapshot((querySnapshot) => {
                  if (querySnapshot.empty) {
                      container.innerHTML = "<p style='color:#94a3b8; text-align:center;'>No transaction records found.</p>";
                      return;
                  }
                  container.innerHTML = "";
                  querySnapshot.forEach((doc) => {
                      const data = doc.data();
                      let badgeColor = "#f59e0b"; 
                      if (data.status === "Approved") badgeColor = "#22c55e";
                      if (data.status === "Rejected") badgeColor = "#ef4444";

                      container.innerHTML += `
                          <div class="card" style="border-left: 4px solid ${badgeColor}">
                              <span style="float:right; font-size:12px; font-weight:bold; color:${badgeColor}">${data.status}</span>
                              <div style="font-weight:600;">${data.userEmail || 'N/A'}</div>
                              <div class="small">Amount: ₦${(data.amount || 0).toLocaleString()}</div>
                              <div class="small">Bank Details: ${data.bankName || 'N/A'} - ${data.accountNumber || 'N/A'}</div>
                          </div>
                      `;
                  });
              });
        } catch (e) {
            console.error(e);
        }
    }

    // ============================================
    // GLOBAL EXPOSURES FOR WINDOW ACTION BUTTONS
    // ============================================
    window.approvePayout = async function(docId, userId, amount) {
        if(!confirm("Approve this payout? This will deduct the balance on the server database records.")) return;
        try {
            await db.collection("withdrawals").doc(docId).update({ status: "Approved" });
            await db.collection("users").doc(userId).update({
                balance: firebase.firestore.FieldValue.increment(-amount)
            });
            alert("Payout approved and balance synchronized cleanly!");
        } catch(e) { 
            console.error(e);
            alert("Error updating database field elements. Ensure that your 'users' collection document matches the variable string name 'balance'!"); 
        }
    };

    window.rejectPayout = async function(docId) {
        if(!confirm("Reject this payout?")) return;
        try {
            await db.collection("withdrawals").doc(docId).update({ status: "Rejected" });
            alert("Payout rejected successfully.");
        } catch(e) { 
            console.error(e);
            alert("Error handling database write sequence."); 
        }
    };

    // Make functions globally available to buttons
    window.adminLogin = adminLogin;
    window.logout = logout;
    window.showTab = showTab;
</script>

</body>
</html>
