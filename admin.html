<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarnSphereHub Admin</title>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body{font-family:'Inter',sans-serif; background:#0a0a0a; color:white; padding:15px}
.login-box{max-width:400px; margin:100px auto; background:#1e293b; padding:30px; border-radius:12px}
input,button{width:100%; padding:12px; margin:8px 0; border-radius:8px; border:1px solid #334155; background:#0f172a; color:white}
button{background:#f59e0b; border:none; font-weight:700; cursor:pointer}
h1{color:#f59e0b; text-align:center}
.tabs{display:flex; gap:10px; margin-bottom:20px}
.tab{padding:10px 15px; background:#1e293b; border-radius:12px; cursor:pointer}
.tab.active{background:#f59e0b; color:#0a0a0a; font-weight:700}
.card{background:#1e293b; padding:15px; border-radius:12px; margin-bottom:12px; border-left:4px solid #f59e0b}
.btn{padding:8px 12px; border:none; border-radius:6px; cursor:pointer; margin-right:8px; font-weight:600}
.approve{background:#22c55e; color:white}
.decline{background:#ef4444; color:white}
.small{font-size:12px; color:#94a3b8}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-box">
  <h1><i class="fas fa-shield-alt"></i> Admin Login</h1>
  <input type="email" id="adminEmail" placeholder="Admin Email" value="wilcoxrichard85@gmail.com">
  <input type="password" id="adminPass" placeholder="Password">
  <button onclick="adminLogin()">Login</button>
  <p id="loginMsg" style="color:#ef4444; text-align:center"></p>
</div>

<!-- ADMIN DASHBOARD -->
<div id="adminPanel" style="display:none">
  <h1><i class="fas fa-shield-alt"></i> EarnSphereHub Admin 
    <button onclick="logout()" style="float:right; width:auto; padding:8px 12px; background:#ef4444">Logout</button>
  </h1>

  <div class="tabs">
    <div class="tab active" onclick="showTab('withdrawals', this)">Withdrawals</div>
    <div class="tab" onclick="showTab('transactions', this)">Transactions</div>
  </div>

  <div id="withdrawals"></div>
  <div id="transactions" style="display:none"></div>
</div>

<script>
// YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCVExwvLDwVmMJ6XbyTCrY1IyMqyhiuLbo",
  authDomain: "earnspherehub-742e9.firebaseapp.com",
  projectId: "earnspherehub-742e9",
  storageBucket: "earnspherehub-742e9.firebasestorage.app",
  messagingSenderId: "173538573377",
  appId: "1:173538573377:web:6d8c748376afcb9096dac0"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const ADMIN_EMAIL = "wilcoxrichard85@gmail.com"; // LOCKED TO YOU

// CHECK IF ALREADY LOGGED IN
auth.onAuthStateChanged(user => {
  if(user && user.email === ADMIN_EMAIL){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadData();
  } else {
    if(user) auth.signOut(); // kick out any other user
    document.getElementById('loginScreen').style.display = 'block';
    document.getElementById('adminPanel').style.display = 'none';
  }
})

function adminLogin(){
  const email = adminEmail.value;
  const pass = adminPass.value;
  auth.signInWithEmailAndPassword(email, pass)
  .catch(err => loginMsg.innerText = err.message);
}

function logout(){ auth.signOut(); }

function showTab(tab, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('withdrawals').style.display = tab=='withdrawals'?'block':'none';
  document.getElementById('transactions').style.display = tab=='transactions'?'block':'none';
}

function loadData(){
  // LOAD WITHDRAWALS
  db.collection('withdrawals').where('status','==','pending').orderBy('requestedAt','desc')
  .onSnapshot(snap=>{
    withdrawals.innerHTML = snap.empty? '<p>No pending withdrawals</p>' : '';
    snap.forEach(doc=>{
      const d = doc.data();
      withdrawals.innerHTML += `
      <div class="card">
        <b>${d.email}</b> <span class="small">${d.requestedAt?.toDate().toLocaleString() || ''}</span><br>
        <b>Amount: ₦${d.amount?.toLocaleString()}</b><br>
        Bank: ${d.bankName} <br>
        Account: ${d.accountNumber} - ${d.accountName}<br><br>
        <button class="btn approve" onclick="updateStatus('withdrawals','${doc.id}','paid')">Approve & Pay</button>
        <button class="btn decline" onclick="updateStatus('withdrawals','${doc.id}','declined')">Decline</button>
      </div>`
    })
  })

  // LOAD TRANSACTIONS
  db.collection('transactions').where('status','==','pending').orderBy('createdAt','desc')
  .onSnapshot(snap=>{
    transactions.innerHTML = snap.empty? '<p>No pending transactions</p>' : '';
    snap.forEach(doc=>{
      const d = doc.data();
      transactions.innerHTML += `
      <div class="card">
        <b>${d.type.toUpperCase()}</b> - ₦${d.amount?.toLocaleString()}<br>
        <span class="small">User: ${d.userId}</span><br>
        ${d.phone? `Phone: ${d.phone}<br>` : ''}
        ${d.network? `Network: ${d.network}<br>` : ''}
        ${d.biller? `Biller: ${d.biller} - ${d.account}<br>` : ''}
        <span class="small">${d.createdAt?.toDate().toLocaleString() || ''}</span><br><br>
        <button class="btn approve" onclick="updateStatus('transactions','${doc.id}','completed')">Mark Completed</button>
        <button class="btn decline" onclick="updateStatus('transactions','${doc.id}','failed')">Mark Failed</button>
      </div>`
    })
  })
}

async function updateStatus(collection, id, status){
  await db.collection(collection).doc(id).update({status: status});
  alert('Updated to: ' + status);
}
</script>
</body>
</html>
