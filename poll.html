<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Poll - EarnSphere</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <style>
    body { font-family:'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height:100vh; color:#f1f5f9; padding:2rem; display:flex; align-items:center; justify-content:center; }
    .container { max-width:500px; background:rgba(30,41,59,.6); backdrop-filter:blur(12px); border-radius:1rem; padding:2rem; border:1px solid rgba(255,255,255,.1); }
    .back-link { color:#3b82f6; text-decoration:none; display:inline-block; margin-bottom:1rem; }
    .back-link:hover { text-decoration:underline; }
    h1 { margin-bottom:.5rem; }
    .reward-badge { background:rgba(16,185,129,.2); color:#10b981; padding:.25rem .75rem; border-radius:.25rem; font-size:.9rem; display:inline-block; margin:1rem 0; }
    .poll-options label { display:block; margin:.5rem 0; padding:.5rem; background:rgba(255,255,255,.05); border-radius:8px; cursor:pointer; }
    .poll-options label:hover { background:rgba(255,255,255,.1); }
    .poll-options input[type="radio"] { margin-right:.5rem; }
    .btn-primary { background:linear-gradient(135deg, #3b82f6, #2563eb); border:none; color:#fff; padding:1rem; border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer; width:100%; margin-top:1rem; }
    .btn-primary:hover:not(:disabled) { transform:scale(1.02); }
    .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
    .toast { background:rgba(30,41,59,.95); padding:1rem 1.5rem; border-radius:.5rem; border:1px solid rgba(16,185,129,.3); color:#fff; animation:slideIn 0.3s ease; box-shadow:0 4px 15px rgba(0,0,0,.3); position:fixed; top:20px; right:20px; z-index:9999; max-width:90%; }
    @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
  </style>
</head>
<body>
  <div class="container">
    <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>
    <h1><i class="fas fa-vote-yea"></i> Daily Poll</h1>
    <p>Answer our daily poll and earn <strong>₦100</strong>!</p>
    <div class="reward-badge"><i class="fas fa-coins"></i> Reward: ₦100 per day</div>

    <div class="poll-options">
      <p><strong>What is your favorite social media platform?</strong></p>
      <label><input type="radio" name="poll" value="Instagram" /> Instagram</label>
      <label><input type="radio" name="poll" value="TikTok" /> TikTok</label>
      <label><input type="radio" name="poll" value="YouTube" /> YouTube</label>
      <label><input type="radio" name="poll" value="Twitter" /> Twitter / X</label>
      <label><input type="radio" name="poll" value="Facebook" /> Facebook</label>
    </div>
    <button class="btn-primary" id="pollBtn" onclick="submitPoll()"><i class="fas fa-check"></i> Submit & Earn ₦100</button>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCVExwvLDwVmMJ6XbyTCrY1IyMqyhiuLbo",
      authDomain: "earnspherehub-742e9.firebaseapp.com",
      projectId: "earnspherehub-742e9",
      storageBucket: "earnspherehub-742e9.firebasestorage.app",
      messagingSenderId: "173538573377",
      appId: "1:173538573377:web:6d8c748376afcb9096dac0"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let userData = { balance:0, lifetimeTotal:0, successfulTaskCount:0, completedTasks:{} };

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = msg;
      document.body.appendChild(toast);
      setTimeout(() => { toast.remove(); }, 3500);
    }

    function getTodayDateString() {
      return new Date().toISOString().split('T')[0];
    }

    function isCompletedToday(taskId) {
      if (!userData.completedTasks || !userData.completedTasks[taskId]) return false;
      const completedDate = new Date(userData.completedTasks[taskId]).toISOString().split('T')[0];
      return completedDate === getTodayDateString();
    }

    async function loadUserData(uid) {
      const doc = await db.collection('users').doc(uid).get();
      if (doc.exists) {
        userData = doc.data();
        const taskId = 'extra_poll';
        if (isCompletedToday(taskId)) {
          document.getElementById('pollBtn').disabled = true;
          document.getElementById('pollBtn').innerHTML = '✅ Completed Today';
        }
      }
    }

    async function submitPoll() {
      const selected = document.querySelector('input[name="poll"]:checked');
      if (!selected) {
        showToast('⚠️ Please select an option.');
        return;
      }

      const user = auth.currentUser;
      if (!user) {
        showToast('⚠️ Please log in.');
        return;
      }

      await loadUserData(user.uid);
      const taskId = 'extra_poll';
      if (isCompletedToday(taskId)) {
        showToast('⚠️ You already completed the poll today!');
        return;
      }

      if (!userData.completedTasks) userData.completedTasks = {};
      userData.completedTasks[taskId] = Date.now();
      const reward = 100;
      userData.balance = (userData.balance || 0) + reward;
      userData.lifetimeTotal = (userData.lifetimeTotal || 0) + reward;
      userData.successfulTaskCount = (userData.successfulTaskCount || 0) + 1;

      await db.collection('users').doc(user.uid).set(userData, { merge: true });
      showToast(`🎉 Poll submitted! +₦${reward} earned!`);
      document.getElementById('pollBtn').disabled = true;
      document.getElementById('pollBtn').innerHTML = '✅ Completed Today';
    }

    auth.onAuthStateChanged(async (user) => {
      if (user) await loadUserData(user.uid);
    });
  </script>
</body>
</html>
