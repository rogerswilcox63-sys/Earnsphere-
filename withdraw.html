<script>
    const withdrawBtn = document.getElementById('withdrawBtn');
    const withdrawMessage = document.getElementById('withdrawMessage');
    const walletBalanceElement = document.getElementById('walletBalance');
    const withdrawForm = document.getElementById('withdrawForm');

    let currentBalance = 0;
    let localUserData = JSON.parse(localStorage.getItem('currentUser'));

    // 1. STATE DISPATCHER: TRACK ACTIVE FIREBASE USER SESSIONS
    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            // Check if we can fall back to local storage session if offline in mobile preview
            if (localUserData) {
                document.getElementById('userName').innerText = `Welcome, ${localUserData.name}`;
                currentBalance = parseFloat(localUserData.balance) || 0;
                walletBalanceElement.innerText = `₦${currentBalance.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
            } else {
                window.location.href = 'login.html';
            }
        } else {
            // Live Firebase session found: Stream balance fresh from Firestore
            try {
                const userRef = db.collection('users').doc(user.uid);
                
                // Set up a real-time listener so the balance automatically updates if changed
                userRef.onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        document.getElementById('userName').innerText = `Welcome, ${data.name}`;
                        currentBalance = parseFloat(data.balance) || 0;
                        walletBalanceElement.innerText = `₦${currentBalance.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
                        
                        // Sync back down to local caches for continuity
                        localStorage.setItem('currentUser', JSON.stringify(data));
                        localStorage.setItem('walletBalance', currentBalance);
                    }
                });
            } catch (err) {
                console.error("Firestore balance stream failed:", err);
            }
        }
    });

    // 2. PROCESS WITHDRAWAL REQUEST IN FIRESTORE
    withdrawForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const amount = parseFloat(document.getElementById('withdrawAmount').value);
        const bankName = document.getElementById('bankName').value;
        const accNum = document.getElementById('accountNumber').value;
        const accName = document.getElementById('accountName').value;

        withdrawMessage.innerHTML = ''; // Clear previous messages

        // FIXED VALIDATION CHECKS (Set precisely to ₦20,000 threshold limit)
        if (currentBalance < 20000) {
            withdrawMessage.innerHTML = '<div class="message error"><i class="fas fa-exclamation-triangle"></i> Insufficient funds. Minimum balance of ₦20,000 required to withdraw.</div>';
            return;
        }

        if (!amount || amount < 20000) {
            withdrawMessage.innerHTML = '<div class="message error"><i class="fas fa-exclamation-triangle"></i> Minimum withdrawal amount is ₦20,000</div>';
            return;
        }

        if (amount > currentBalance) {
            withdrawMessage.innerHTML = '<div class="message error"><i class="fas fa-exclamation-triangle"></i> Amount exceeds your available balance</div>';
            return;
        }

        if (accNum.length !== 10 || isNaN(accNum)) {
            withdrawMessage.innerHTML = '<div class="message error"><i class="fas fa-exclamation-triangle"></i> Enter a valid 10-digit account number</div>';
            return;
        }

        withdrawBtn.disabled = true;
        withdrawBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting Request...';

        const firebaseUser = auth.currentUser;

        if (firebaseUser) {
            // Live production mode execution path
            try {
                const userRef = db.collection('users').doc(firebaseUser.uid);
                const withdrawalRef = db.collection('withdrawals').doc(); // Create new transaction document ID

                // Run a safe Firestore database transaction routine
                await db.runTransaction(async (transaction) => {
                    const userDoc = await transaction.get(userRef);
                    if (!userDoc.exists) throw "User record missing!";

                    const latestBalance = userDoc.data().balance || 0;
                    if (amount > latestBalance) throw "Insufficient funds verified on server side!";

                    // A. Deduct funds from user profile model
                    transaction.update(userRef, {
                        balance: latestBalance - amount
                    });

                    // B. File payout ticket entry in withdrawals collection for admin panel review
                    transaction.set(withdrawalRef, {
                        requestId: withdrawalRef.id,
                        uid: firebaseUser.uid,
                        email: firebaseUser.email,
                        name: userDoc.data().name || "Unknown User",
                        amountRequested: amount,
                        bankName: bankName,
                        accountNumber: accNum,
                        accountName: accName,
                        status: "Pending", // Will be marked "Approved" manually by you once sent via your bank app
                        createdAt: new Date().toISOString()
                    });
                });

                withdrawMessage.innerHTML = `<div class="message success"><i class="fas fa-check-circle"></i> Withdrawal of ₦${amount.toLocaleString()} logged to Firestore! Processing timeline: 24-48hrs.</div>`;
                withdrawForm.reset();

            } catch (err) {
                console.error("Firestore Transaction Error:", err);
                withdrawMessage.innerHTML = `<div class="message error"><i class="fas fa-times-circle"></i> Submission failed: ${err.message || err}</div>`;
            } finally {
                withdrawBtn.disabled = false;
                withdrawBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Request Withdrawal';
            }
        } else {
            // Network fallback engine route (For local mobile phone previews)
            currentBalance -= amount;
            if (localUserData) {
                localUserData.balance = currentBalance;
                localStorage.setItem('currentUser', JSON.stringify(localUserData));
            }
            localStorage.setItem('walletBalance', currentBalance);
            walletBalanceElement.innerText = `₦${currentBalance.toLocaleString('en-US', {minimumFractionDigits: 2})}`;

            withdrawMessage.innerHTML = `<div class="message success"><i class="fas fa-check-circle"></i> Simulated offline payout processed! ₦${amount.toLocaleString()} removed locally.</div>`;
            withdrawForm.reset();
            withdrawBtn.disabled = false;
            withdrawBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Request Withdrawal';
        }
    });

    // 3. SECURITY SIGN OUT ENGINE
    async function logout() {
        try {
            await auth.signOut();
        } catch (err) {
            console.log("Offline exit executed.");
        }
        localStorage.removeItem('currentUser');
        localStorage.removeItem('walletBalance');
        window.location.href = 'login.html';
    }
</script>
