    <meta charset="UTF-8">

    <style>
        :root { --primary: #3b82f6; --primary-dark: #2563eb; --secondary: #10b981; --danger: #ef4444; --dark: #0f172a; --dark-light: #1e293b; --gray: #64748b; --gray-light: #cbd5e1; --light: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: linear-gradient(135deg, var(--dark), var(--dark-light)); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: var(--light); }
        .container { width: 100%; max-width: 450px; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border-radius: 16px; padding: 40px 30px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 28px; font-weight: 700; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .logo p { color: var(--gray-light); font-size: 14px; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: var(--gray-light); }
        .input-group input { width: 100%; padding: 14px 16px 14px 45px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: var(--light); font-size: 15px; transition: all 0.3s ease; }
        .input-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        .input-group i { position: absolute; left: 16px; top: 40px; color: var(--gray); font-size: 18px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .login-link { text-align: center; margin-top: 20px; font-size: 14px; color: var(--gray-light); }
        .login-link a { color: var(--primary); text-decoration: none; font-weight: 500; }

        .message { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; font-weight: 500; display: none; }

<body>
    <div class="container">
        <div class="logo">
            <h1>EarnSphereHub</h1>
            <p>Reset your password</p>
        </div>

        <div id="messageBox" class="message"></div>

        <div class="info-text">
            <i class="fas fa-info-circle"></i> Enter your email and we'll send you a link to reset your password.
        </div>

        <div id="resetForm">
            <div class="input-group">
                <label for="email">Email Address</label>
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <button class="btn btn-primary" id="resetBtn">
                <i class="fas fa-paper-plane"></i> Send Reset Link
            </button>
        </div>

        <div class="login-link">
            Remember your password? <a href="login.html">Back to Login</a>
        </div>
    </div>

    <script>
        const resetBtn = document.getElementById('resetBtn');
        const messageBox = document.getElementById('messageBox');

        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = `message ${type}`;
        }

        resetBtn.addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            
            messageBox.style.display = 'none';
            if (!email) {
                showMessage('Please enter your email address', 'error');
                return;
            }

            resetBtn.disabled = true;
            resetBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

            try {
                await auth.sendPasswordResetEmail(email);
                showMessage('Password reset email sent! Check your inbox and spam folder. The link expires in 1 hour.', 'success');
                document.getElementById('email').value = '';
            } catch (error) {
                let msg = error.message;
                if (error.code === 'auth/user-not-found') msg = 'No account found with this email.';
                if (error.code === 'auth/invalid-email') msg = 'Invalid email address.';
                if (error.code === 'auth/too-many-requests') msg = 'Too many requests. Try again later.';
                showMessage(msg, 'error');
            } finally {
                resetBtn.disabled = false;
                resetBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
            }
        });

        // Allow Enter key to submit
        document.getElementById('email').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') resetBtn.click();
        });
    </script>
</body>
