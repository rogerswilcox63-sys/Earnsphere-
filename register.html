<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - EarnSphereHub</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a73e8, #25D366);
      margin: 0;
      padding: 2rem 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .register-box {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      width: 90%;
      max-width: 420px;
      text-align: center;
    }

    .register-box h2 {
      color: #1a73e8;
      margin-bottom: 0.5rem;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin: 1.5rem 0;
      background: #f1f3f4;
      padding: 0.3rem;
      border-radius: 10px;
    }

    .tab {
      flex: 1;
      padding: 0.7rem;
      border: none;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      color: #555;
    }

    .tab.active {
      background: white;
      color: #1a73e8;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 0.9rem;
      margin: 0.6rem 0;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 10px;
      background: #1a73e8;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 0.8rem;
      transition: 0.2s;
    }

    button:hover {
      background: #1558b0;
      transform: translateY(-1px);
    }

    #recaptcha-container {
      margin: 1rem 0;
      display: flex;
      justify-content: center;
    }

    .hidden { display: none; }

    .login-link {
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .login-link a {
      color: #1a73e8;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="register-box">
    <h2>Create Your Account</h2>
    <p>Join EarnSphereHub and start earning</p>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="showTab('email')">Email</button>
      <button class="tab" onclick="showTab('phone')">Phone</button>
    </div>

    <!-- EMAIL FORM -->
    <div id="email-form">
      <input type="email" id="email" placeholder="Enter your email" required>
      <input type="password" id="password" placeholder="Create password" required>
      <button id="email-register">Register with Email</button>
    </div>

    <!-- PHONE FORM -->
    <div id="phone-form" class="hidden">
      <input type="tel" id="phone" placeholder="+234 801 234 5678" required>
      <div id="recaptcha-container"></div>
      <button id="send-code">Send OTP</button>

      <div id="otp-section" class="hidden">
        <input type="text" id="otp" placeholder="Enter 6-digit code" maxlength="6">
        <button id="verify-code">Verify & Register</button>
      </div>
    </div>

    <div class="login-link">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>

  <script type="module">
    // 1. IMPORT FIREBASE
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 2. PASTE YOUR FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let confirmationResult;

    // TAB SWITCHER
    window.showTab = (tab) => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('email-form').classList.add('hidden');
      document.getElementById('phone-form').classList.add('hidden');
      
      if(tab === 'email'){
        document.querySelector('.tab:nth-child(1)').classList.add('active');
        document.getElementById('email-form').classList.remove('hidden');
      } else {
        document.querySelector('.tab:nth-child(2)').classList.add('active');
        document.getElementById('phone-form').classList.remove('hidden');
      }
    }

    // 3. EMAIL REGISTRATION
    document.getElementById('email-register').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        await setDoc(doc(db, "users", user.uid), {
          email: user.email,
          phone: "",
          balance: 0,
          createdAt: new Date(),
          status: "active"
        });
        
        alert('Account created!');
        window.location.href = 'dashboard.html';
      } catch (error) {
        alert(error.message);
      }
    });

    // 4. SETUP RECAPTCHA FOR PHONE
    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
      'size': 'normal'
    });

    // 5. PHONE REGISTRATION
    document.getElementById('send-code').addEventListener('click', () => {
      const phoneNumber = document.getElementById('phone').value;
      if(!phoneNumber.startsWith('+')){
        alert('Use format: +2348012345678');
        return;
      }

      signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier)
        .then((result) => {
          confirmationResult = result;
          document.getElementById('otp-section').classList.remove('hidden');
          document.getElementById('send-code').style.display = 'none';
          alert('OTP sent to ' + phoneNumber);
        }).catch((error) => {
          alert(error.message);
        });
    });

    document.getElementById('verify-code').addEventListener('click', async () => {
      const code = document.getElementById('otp').value;
      try {
        const result = await confirmationResult.confirm(code);
        const user = result.user;
        
        await setDoc(doc(db, "users", user.uid), {
          email: "",
          phone: user.phoneNumber,
          balance: 0,
          createdAt: new Date(),
          status: "active"
        });

        alert('Phone registered!');
        window.location.href = 'dashboard.html';
      } catch (error) {
        alert('Invalid OTP');
      }
    });
  </script>
</body>
</html>
