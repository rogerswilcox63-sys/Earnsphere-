<body>
    <div class="container">
        <div class="logo">
            <h1>EarnSphereHub</h1>
            <p>Create your account and start earning</p>
        </div>

        <div id="refNotice" class="ref-notice" style="display: none;">
            <i class="fas fa-gift"></i> You were referred! Get ₦300 bonus after your first task.
        </div>

        <div id="messageBox" class="message"></div>

        <!-- FORMSPREE FORM - PUT YOUR ENDPOINT HERE -->
        <form id="registerForm" action="https://formspree.io/f/mvzjqgpy" method="POST">
            <div class="input-group">
                <label for="name">Full Name</label>
                <i class="fas fa-user"></i>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <i class="fas fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
            </div>

            <!-- Hidden field for referral code -->
            <input type="hidden" id="referredBy" name="referredBy" value="">

            <button type="submit" class="btn btn-primary" id="submitBtn">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script>
        // Check if user came with referral code from the URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref');
        if (refCode) {
            document.getElementById('refNotice').style.display = 'block';
            document.getElementById('referredBy').value = refCode;
        }

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const messageBox = document.getElementById('messageBox');

            // Form validation
            if (!name || !email || !password) {
                showMessage('Please fill all fields', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }

            // UI Feedback state change
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';

            // --- INTEGRATING FIREBASE LOGIC ---
            try {
                // 1. Create user in Firebase Authentication
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Update user profile display name inside Firebase Auth
                await user.updateProfile({ displayName: name });

                // Generate a unique referral link identifier for this user
                const userRefCode = 'EARN' + Math.random().toString(36).substring(2, 8).toUpperCase();

                // 2. Prepare metadata payload for the Firestore user document
                const userDocData = {
                    uid: user.uid,
                    name: name,
                    email: email,
                    balance: 0,
                    lifetimeTotal: 0,
                    successfulTaskCount: 0,
                    completedTaskIds: [],
                    refCode: userRefCode,
                    referredBy: refCode || null,
                    refBonusPaid: false,
                    totalRefs: 0,
                    refEarned: 0,
                    pendingRefBonus: 0,
                    joinedDate: new Date().toISOString()
                };

                // 3. Save directly to Firestore Database
                await db.collection('users').doc(user.uid).set(userDocData);

                // Safe Fallback: Sync with localStorage so preview modes continue to work perfectly on your phone!
                localStorage.setItem('currentUser', JSON.stringify(userDocData));
                let localUsers = JSON.parse(localStorage.getItem('users') || '[]');
                localUsers.push(userDocData);
                localStorage.setItem('users', JSON.stringify(localUsers));

                // Optional Formspree submission for backup email alerts
                try {
                    const formData = new FormData(this);
                    await fetch(this.action, {
                        method: 'POST',
                        body: formData,
                        headers: { 'Accept': 'application/json' }
                    });
                } catch (formspreeErr) {
                    console.log("Formspree notification skipped, user already active in Firebase.");
                }

                showMessage('Account created successfully via Firebase! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } catch (error) {
                console.error("Firebase Registration Error: ", error);
                
                // Direct specific friendly error handling warnings
                if (error.code === 'auth/email-already-in-use') {
                    showMessage('This email is already registered. Please go to login.', 'error');
                } else if (error.code === 'auth/invalid-email') {
                    showMessage('The email address structure is invalid.', 'error');
                } else if (error.code === 'auth/weak-password') {
                    showMessage('The password is too weak.', 'error');
                } else {
                    // Fallback local tracking if server is unavailable during local storage app development testing
                    showMessage('Network offline: Account generated in preview mode local storage.', 'success');
                    
                    let fallbackUser = {
                        name: name, email: email, password: password, balance: 0, lifetimeTotal: 0,
                        successfulTaskCount: 0, completedTaskIds: [], refCode: 'LOCAL' + Date.now(),
                        referredBy: refCode || null, joinedDate: new Date().toISOString()
                    };
                    localStorage.setItem('currentUser', JSON.stringify(fallbackUser));
                    
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
                }
                
                // Reset button if error occurred
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            }
        });

        function showMessage(text, type) {
            const messageBox = document.getElementById('messageBox');
            messageBox.textContent = text;
            messageBox.className = `message ${type}`;
        }
    </script>
</body>
