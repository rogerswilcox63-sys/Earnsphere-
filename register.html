    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EarnSphereHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #3b82f6; --primary-dark: #2563eb; --secondary: #10b981; --danger: #ef4444; --dark: #0f172a; --dark-light: #1e293b; --gray: #64748b; --gray-light: #cbd5e1; --light: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: linear-gradient(135deg, var(--dark), var(--dark-light)); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: var(--light); }
        .container { width: 100%; max-width: 450px; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border-radius: 16px; padding: 40px 30px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 28px; font-weight: 700; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .logo p { color: var(--gray-light); font-size: 14px; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: var(--gray-light); }
        .input-group input { width: 100%; padding: 14px 16px 14px 45px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: var(--light); font-size: 15px; transition: all 0.3s ease; }
        .input-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        .input-group i { position: absolute; left: 16px; top: 40px; color: var(--gray); font-size: 18px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-secondary { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.3); }
        .btn-secondary:hover { background: rgba(16, 185, 129, 0.3); }
        .login-link { text-align: center; margin-top: 20px; font-size: 14px; color: var(--gray-light); }
        .login-link a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .login-link a:hover { color: var(--primary-dark); }
        .message { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; font-weight: 500; display: none; }
        .message.error { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); display: block; }
        .message.success { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.3); display: block; }
        .ref-notice { background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; color: #93c5fd; text-align: center; }
        #verifyScreen { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>EarnSphereHub</h1>
            <p>Create your account</p>
        </div>

        <div id="messageBox" class="message"></div>

        <!-- Register Form -->
        <div id="registerForm">
            <div class="input-group">
                <label for="displayName">Full Name</label>
                <i class="fas fa-user"></i>
                <input type="text" id="displayName" placeholder="Enter your full name" required>
            </div>
            <div class="input-group">
                <label for="email">Email Address</label>
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Min 6 characters" required>
            </div>
            <button class="btn btn-primary" id="registerBtn">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </div>

        <!-- Verify Email Screen -->
        <div id="verifyScreen">
            <div class="ref-notice">
                <i class="fas fa-envelope-circle-check"></i>
                <strong>Verify your email</strong><br>
                We sent a link to <span id="userEmail"></span>. Click it to activate your account.
            </div>
            <button class="btn btn-secondary" id="resendBtn">
                <i class="fas fa-paper-plane"></i> Resend Email
            </button>
            <button class="btn btn-primary" id="checkBtn">
                <i class="fas fa-check-circle"></i> I've Verified - Continue
            </button>
        </div>

        <div class="login-link">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script>
    const registerBtn = document.getElementById('registerBtn');
    const messageBox = document.getElementById('messageBox');

    function showMessage(text, type) {
        messageBox.textContent = text;
        messageBox.className = `message ${type}`;
        messageBox.style.display = 'block';
        if (type === 'success') {
            setTimeout(() => messageBox.style.display = 'none', 4000);
        }
    }

    // Don't let verified users sit on register page
    auth.onAuthStateChanged(user => {
        if (user && user.emailVerified) {
            window.location.href = 'dashboard.html';
        }
    });

    registerBtn.addEventListener('click', async () => {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        messageBox.style.display = 'none';
        
        // Basic validation
        if (!name || !email || !password || !confirmPassword) {
            showMessage('Please fill all fields', 'error');
            return;
        }
        if (password !== confirmPassword) {
            showMessage('Passwords do not match', 'error');
            return;
        }
        if (password.length < 6) {
            showMessage('Password must be at least 6 characters', 'error');
            return;
        }

        registerBtn.disabled = true;
        registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';

        try {
            // 1. Create the user
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            const user = userCredential.user;

            // 2. Update display name
            await user.updateProfile({ displayName: name });

            // 3. Send verification email - THIS IS CRITICAL
            await user.sendEmailVerification();
            console.log('Verification email sent to:', user.email);

            // 4. Save user data to Firestore
            await db.collection('users').doc(user.uid).set({
                uid: user.uid,
                name: name,
                email: email,
                emailVerified: false, // Starts as false
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                balance: 0
            });

            // 5. Sign them out so they can't access dashboard yet
            await auth.signOut();

            showMessage('Account created! Check your email to verify your account before logging in.', 'success');
            
            // Clear form
            document.getElementById('name').value = '';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('confirmPassword').value = '';
            
            // Redirect to login after 3 seconds
            setTimeout(() => window.location.href = 'login.html', 3000);

        } catch (error) {
            let msg = error.message;
            if (error.code === 'auth/email-already-in-use') msg = 'This email is already registered. Try logging in.';
            if (error.code === 'auth/invalid-email') msg = 'Invalid email address.';
            if (error.code === 'auth/weak-password') msg = 'Password is too weak. Use at least 6 characters.';
            showMessage(msg, 'error');
        } finally {
            registerBtn.disabled = false;
            registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
        }
    });

    // Allow Enter key to submit
    document.getElementById('confirmPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') registerBtn.click();
    });
</script>
</body>
</html>
