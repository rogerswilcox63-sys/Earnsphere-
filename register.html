<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - EarnSphereHub</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a73e8, #25D366);
      margin: 0;
      padding: 2rem 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .register-box {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      width: 90%;
      max-width: 420px;
      text-align: center;
    }

    .register-box h2 {
      color: #1a73e8;
      margin-bottom: 0.5rem;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin: 1.5rem 0;
      background: #f1f3f4;
      padding: 0.3rem;
      border-radius: 10px;
    }

    .tab {
      flex: 1;
      padding: 0.7rem;
      border: none;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      color: #555;
    }

    .tab.active {
      background: white;
      color: #1a73e8;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 0.9rem;
      margin: 0.6rem 0;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 10px;
      background: #1a73e8;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 0.8rem;
      transition: 0.2s;
    }

    button:hover {
      background: #1558b0;
      transform: translateY(-1px);
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    #recaptcha-container {
      margin: 1rem 0;
      display: flex;
      justify-content: center;
    }

    .hidden { display: none; }

    .login-link {
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .login-link a {
      color: #1a73e8;
      text-decoration: none;
      font-weight: bold;
    }

    .success {
      color: #10b981;
      font-weight: bold;
      margin: 1rem 0;
    }
  </style>
</head>
<body>

  <div class="register-box">
    <h2>Create Your Account</h2>
    <p>Join EarnSphereHub and start earning</p>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="showTab('email')">Email</button>
      <button class="tab" onclick="showTab('phone')">Phone</button>
    </div>

    <!-- EMAIL FORM -->
    <div id="email-form">
      <input type="email" id="email" placeholder="Enter your email" required>
      <input type="password" id="password" placeholder="Create password (min 6 chars)" required>
      <button id="email-register">Register with Email</button>
      <p style="font-size:0.8rem; color:#666; margin-top:0.5rem;">
        We'll send a verification link to your email.
      </p>
    </div>

    <!-- PHONE FORM -->
    <div id="phone-form" class="hidden">
      <input type="tel" id="phone" placeholder="+2348012345678" required>
      <div id="recaptcha-container"></div>
      <button id="send-code">Send OTP</button>

      <div id="otp-section" class="hidden">
        <input type="text" id="otp" placeholder="Enter 6-digit code" maxlength="6">
        <button id="verify-code">Verify &amp; Register</button>
      </div>
    </div>

    <div class="login-link">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>

  <script type="module">
    // Firebase v10 Modular (modern)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
      getAuth, 
      createUserWithEmailAndPassword, 
      sendEmailVerification,
      RecaptchaVerifier, 
      signInWithPhoneNumber 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // === YOUR FIREBASE CONFIG (FIXED - removed extra comma) ===
    const firebaseConfig = {
      apiKey: "AIzaSyCVExwvLDwVmMJ6XbyTCrY1IyMqyhiuLbo",
      authDomain: "earnspherehub-742e9.firebaseapp.com",
      projectId: "earnspherehub-742e9",
      storageBucket: "earnspherehub-742e9.firebasestorage.app",
      messagingSenderId: "173538573377",
      appId: "1:173538573377:web:6d8c748376afcb9096dac0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let confirmationResult = null;
    let recaptchaVerifier = null;

    // Tab switcher
    window.showTab = function(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('email-form').classList.add('hidden');
      document.getElementById('phone-form').classList.add('hidden');

      if (tab === 'email') {
        document.querySelector('.tab:nth-child(1)').classList.add('active');
        document.getElementById('email-form').classList.remove('hidden');
      } else {
        document.querySelector('.tab:nth-child(2)').classList.add('active');
        document.getElementById('phone-form').classList.remove('hidden');
        
        // Initialize reCAPTCHA only when phone tab is opened (better UX)
        if (!recaptchaVerifier) {
          initRecaptcha();
        }
      }
    };

    // Initialize reCAPTCHA (only when needed)
    function initRecaptcha() {
      const container = document.getElementById('recaptcha-container');
      if (!container) return;

      recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
        size: 'normal',
        callback: () => {
          console.log('reCAPTCHA solved');
        }
      });
    }

    // === EMAIL REGISTRATION (with verification email) ===
    document.getElementById('email-register').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('email-register');

      if (!email || !password) {
        alert('Please fill in both email and password');
        return;
      }
      if (password.length < 6) {
        alert('Password must be at least 6 characters');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Create user document in Firestore
        await setDoc(doc(db, "users", user.uid), {
          email: user.email,
          phone: "",
          balance: 0,
          lifetimeTotal: 0,
          successfulTaskCount: 0,
          completedTaskIds: [],
          createdAt: new Date(),
          status: "active"
        });

        // Send verification email (IMPORTANT - matches dashboard requirement)
        await sendEmailVerification(user);

        btn.textContent = 'Account created!';
        alert('Account created! Please check your email for the verification link, then login.');

        // Redirect to login after short delay
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);

      } catch (error) {
        console.error(error);
        alert(error.message);
        btn.disabled = false;
        btn.textContent = 'Register with Email';
      }
    });

    // === PHONE REGISTRATION ===
    document.getElementById('send-code').addEventListener('click', async () => {
      const phoneInput = document.getElementById('phone');
      const phoneNumber = phoneInput.value.trim();
      const btn = document.getElementById('send-code');

      if (!phoneNumber.startsWith('+')) {
        alert('Please use international format, e.g. +2348012345678');
        return;
      }

      if (!recaptchaVerifier) {
        initRecaptcha();
      }

      btn.disabled = true;
      btn.textContent = 'Sending OTP...';

      try {
        confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, recaptchaVerifier);
        
        document.getElementById('otp-section').classList.remove('hidden');
        btn.style.display = 'none';
        alert('OTP sent successfully to ' + phoneNumber);

      } catch (error) {
        console.error(error);
        alert('Error sending OTP: ' + error.message);
        btn.disabled = false;
        btn.textContent = 'Send OTP';
        
        // Reset reCAPTCHA on error
        if (recaptchaVerifier) {
          recaptchaVerifier.clear();
          recaptchaVerifier = null;
        }
      }
    });

    document.getElementById('verify-code').addEventListener('click', async () => {
      const code = document.getElementById('otp').value.trim();
      const btn = document.getElementById('verify-code');

      if (!code || code.length !== 6) {
        alert('Please enter the 6-digit code');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Verifying...';

      try {
        const result = await confirmationResult.confirm(code);
        const user = result.user;

        // Create user document
        await setDoc(doc(db, "users", user.uid), {
          email: "",
          phone: user.phoneNumber,
          balance: 0,
          lifetimeTotal: 0,
          successfulTaskCount: 0,
          completedTaskIds: [],
          createdAt: new Date(),
          status: "active"
        });

        alert('Phone number verified and account created successfully!');
        window.location.href = 'dashboard.html';

      } catch (error) {
        console.error(error);
        alert('Invalid OTP. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Verify & Register';
      }
    });

    // Optional: Show email tab by default
    console.log('%c[Register Page] Fixed version loaded successfully', 'color:#10b981');
  </script>
</body>
</html>
