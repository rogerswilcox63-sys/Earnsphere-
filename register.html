<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - EarnSphereHub</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1a73e8);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .auth-box {
      background: white;
      padding: 2.5rem 2rem;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .auth-box .logo {
      font-size: 2rem;
      font-weight: 800;
      color: #1a73e8;
      margin-bottom: 0.25rem;
    }

    .auth-box .sub {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    .auth-box h2 {
      color: #1a73e8;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .referral-banner {
      background: #f0f7ff;
      border: 1px solid #d0e3ff;
      border-radius: 10px;
      padding: 8px 12px;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      color: #1a73e8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .referral-banner strong {
      background: #1a73e8;
      color: white;
      padding: 2px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
    }

    .input-group {
      margin: 0.8rem 0;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }

    .input-group input {
      width: 100%;
      padding: 0.85rem;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 1rem;
      transition: border-color 0.2s;
      background: #f9fafb;
    }

    .input-group input:focus {
      outline: none;
      border-color: #1a73e8;
      background: white;
    }

    .input-group input:disabled {
      background: #f3f4f6;
      cursor: not-allowed;
    }

    .btn-primary {
      width: 100%;
      padding: 0.95rem;
      border: none;
      border-radius: 12px;
      background: #1a73e8;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.5rem;
    }

    .btn-primary:hover {
      background: #1558b0;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
    }

    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: #999;
      font-size: 0.85rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .btn-google {
      width: 100%;
      padding: 0.85rem;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      background: white;
      color: #333;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-google:hover {
      background: #f8f9fa;
      border-color: #1a73e8;
    }

    .btn-google img {
      width: 20px;
      height: 20px;
    }

    .switch-link {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #555;
    }

    .switch-link a {
      color: #1a73e8;
      text-decoration: none;
      font-weight: 700;
    }

    .switch-link a:hover {
      text-decoration: underline;
    }

    .error-msg {
      color: #ef4444;
      font-size: 0.85rem;
      margin: 0.5rem 0;
      min-height: 20px;
    }

    .success-msg {
      color: #10b981;
      font-size: 0.85rem;
      margin: 0.5rem 0;
    }

    .ref-badge {
      display: inline-block;
      background: #25D366;
      color: white;
      font-size: 0.7rem;
      padding: 2px 10px;
      border-radius: 12px;
      margin-left: 6px;
    }
  </style>
</head>
<body>

  <div class="auth-box">
    <div class="logo">💰 EarnSphereHub</div>
    <div class="sub">Start earning today</div>

    <h2>Create Account</h2>

    <!-- Referral Code Display -->
    <div class="referral-banner" id="referralBanner">
      🎁 Referral bonus: <strong id="refCodeDisplay">—</strong>
      <span class="ref-badge">+₦300 each</span>
    </div>

    <!-- Register Form -->
    <div id="register-form">
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="registerEmail" placeholder="you@example.com" />
      </div>
      <div class="input-group">
        <label>Password (min 6 chars)</label>
        <input type="password" id="registerPassword" placeholder="Create password" />
      </div>
      <div class="input-group">
        <label>Referral Code (optional)</label>
        <input type="text" id="registerReferral" placeholder="ESH-XXXXXX" />
        <div style="font-size:0.75rem; color:#888; margin-top:4px;">
          💡 Enter a friend's code to earn ₦300 bonus
        </div>
      </div>
      <div id="registerError" class="error-msg"></div>
      <button class="btn-primary" id="registerBtn">Create Account</button>

      <div class="divider">or continue with</div>

      <button class="btn-google" id="googleRegisterBtn">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
          <path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
          <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
          <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
        </svg>
        Sign up with Google
      </button>

      <div class="switch-link">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      sendEmailVerification,
      signInWithPopup,
      GoogleAuthProvider,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc,
      getDoc,
      updateDoc,
      increment
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ─── Firebase Config ──────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyCVExwvLDwVmMJ6XbyTCrY1IyMqyhiuLbo",
      authDomain: "earnspherehub-742e9.firebaseapp.com",
      projectId: "earnspherehub-742e9",
      storageBucket: "earnspherehub-742e9.firebasestorage.app",
      messagingSenderId: "173538573377",
      appId: "1:173538573377:web:6d8c748376afcb9096dac0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // ─── DOM Elements ──────────────────────────────────────────────────────
    const registerEmail = document.getElementById('registerEmail');
    const registerPassword = document.getElementById('registerPassword');
    const registerReferral = document.getElementById('registerReferral');
    const registerBtn = document.getElementById('registerBtn');
    const registerError = document.getElementById('registerError');
    const refCodeDisplay = document.getElementById('refCodeDisplay');

    let appliedReferralCode = null;

    // ─── 1. Auto-detect referral from URL ────────────────────────────────
    function getReferralFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('ref') || params.get('referral') || null;
    }

    const urlRef = getReferralFromURL();
    if (urlRef) {
      registerReferral.value = urlRef;
      appliedReferralCode = urlRef;
      refCodeDisplay.textContent = urlRef;
      registerReferral.style.borderColor = '#10b981';
    } else {
      refCodeDisplay.textContent = 'None';
    }

    // ─── 2. Generate Referral Code ──────────────────────────────────────
    function generateReferralCode(uid) {
      return 'ESH-' + uid.slice(0, 6).toUpperCase() + Math.floor(Math.random() * 10000);
    }

    // ─── 3. Create User Document ──────────────────────────────────────────
    async function createUserDocument(uid, email, referralCode) {
      const userData = {
        email: email || '',
        wallet: 0,
        totalEarned: 0,
        totalReferrals: 0,
        pendingBonus: 0,
        referralCode: referralCode,
        completedTaskIds: [],
        createdAt: new Date().toISOString(),
        status: 'active'
      };

      await setDoc(doc(db, 'users', uid), userData);
      
      // Store in referralCodes collection for lookup
      await setDoc(doc(db, 'referralCodes', referralCode), {
        uid: uid,
        createdAt: new Date().toISOString()
      });

      return userData;
    }

    // ─── 4. Reward Referrer ──────────────────────────────────────────────
    async function rewardReferrer(referralCode) {
      if (!referralCode) return false;

      try {
        const refDoc = await getDoc(doc(db, 'referralCodes', referralCode));
        if (refDoc.exists()) {
          const referrerUid = refDoc.data().uid;
          const referrerRef = doc(db, 'users', referrerUid);
          await updateDoc(referrerRef, {
            totalReferrals: increment(1),
            pendingBonus: increment(300),
            totalEarned: increment(300)
          });
          console.log('✅ Referrer rewarded with ₦300');
          return true;
        }
        return false;
      } catch (err) {
        console.error('Failed to reward referrer:', err);
        return false;
      }
    }

    // ─── 5. Validate Referral Code ───────────────────────────────────────
    async function validateReferralCode(code) {
      if (!code || code.trim() === '') return null;
      const trimmed = code.trim().toUpperCase();
      
      try {
        const refDoc = await getDoc(doc(db, 'referralCodes', trimmed));
        if (refDoc.exists()) {
          return trimmed;
        }
        return null;
      } catch {
        return null;
      }
    }

    // ─── 6. Handle Registration ──────────────────────────────────────────
    async function handleRegister(email, password, referralCode) {
      const btn = registerBtn;
      btn.disabled = true;
      btn.textContent = 'Creating account...';
      registerError.textContent = '';
      registerError.style.color = '#ef4444';

      try {
        // Validate referral code if provided
        let validRef = null;
        if (referralCode) {
          validRef = await validateReferralCode(referralCode);
          if (!validRef) {
            registerError.textContent = '⚠️ Invalid referral code. Please check and try again.';
            btn.disabled = false;
            btn.textContent = 'Create Account';
            return;
          }
        }

        // Create user
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Generate referral code for new user
        const newRefCode = generateReferralCode(user.uid);

        // Create user document
        await createUserDocument(user.uid, email, newRefCode);

        // Reward referrer if valid
        if (validRef) {
          await rewardReferrer(validRef);
        }

        // Send verification email
        await sendEmailVerification(user);

        registerError.style.color = '#10b981';
        registerError.textContent = '✅ Account created! Check your email for verification.';
        btn.textContent = '✅ Done!';

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);

      } catch (error) {
        console.error(error);
        registerError.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    // ─── 7. Google Auth ──────────────────────────────────────────────────
    async function handleGoogleSignUp() {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        // Check if user exists in Firestore
        const userDoc = await getDoc(doc(db, 'users', user.uid));

        if (!userDoc.exists()) {
          // New user - create document
          const newRefCode = generateReferralCode(user.uid);
          await createUserDocument(user.uid, user.email, newRefCode);

          // Check for referral from URL or input
          const refCode = registerReferral.value.trim().toUpperCase() || urlRef;
          if (refCode) {
            const validRef = await validateReferralCode(refCode);
            if (validRef) {
              await rewardReferrer(validRef);
            }
          }
        }

        window.location.href = 'dashboard.html';

      } catch (error) {
        console.error('Google auth error:', error);
        registerError.textContent = 'Google sign-up failed: ' + error.message;
      }
    }

    // ─── 8. Event Listeners ──────────────────────────────────────────────

    // Register button
    registerBtn.addEventListener('click', () => {
      const email = registerEmail.value.trim();
      const password = registerPassword.value;
      const referral = registerReferral.value.trim().toUpperCase();

      if (!email || !password) {
        registerError.textContent = '⚠️ Please fill in all fields';
        return;
      }
      if (password.length < 6) {
        registerError.textContent = '⚠️ Password must be at least 6 characters';
        return;
      }

      handleRegister(email, password, referral);
    });

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        registerBtn.click();
      }
    });

    // Google button
    document.getElementById('googleRegisterBtn').addEventListener('click', handleGoogleSignUp);

    // ─── 9. Auto-redirect if already logged in ──────────────────────────
    onAuthStateChanged(auth, (user) => {
      if (user) {
        getDoc(doc(db, 'users', user.uid)).then(snap => {
          if (snap.exists()) {
            window.location.href = 'dashboard.html';
          }
        }).catch(() => {});
      }
    });

    console.log('%c✅ Register Page with Referral System', 'color:#10b981');
  </script>
</body>
</html>
