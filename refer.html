<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refer & Earn - EarnSphereHub</title>
<style>
  body { background: #0f172a; color: white; font-family: Arial; text-align: center; padding: 20px; }
  .card { background: #1e293b; padding: 20px; border-radius: 12px; margin: 15px 0; }
  .big { font-size: 36px; color: #22c55e; font-weight: bold; }
  .code { font-size: 22px; color: #3b82f6; font-weight: bold; letter-spacing: 2px; }
  button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; margin: 8px 0; cursor: pointer; }
  .blue { background: #3b82f6; color: white; }
  .green { background: #22c55e; color: white; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
</style>
</head>
<body>

<a href="dashboard.html" style="color:#3b82f6; text-decoration:none;">← Back to Dashboard</a>

<h1 style="color:#3b82f6;">Refer & Earn</h1>
<p>Invite friends, get ₦300 per Friend</p>
<div class="big">₦300<span style="font-size:16px; color:white;">/per friend</span></div>

<div class="card">
  <p>Your Referral Code</p>
  <div id="refCode" class="code">LOADING...</div>
  <p id="refLink" style="font-size:12px; opacity:0.7;">Loading link...</p>
</div>

<button class="blue" onclick="copyLink()">📋 Copy Referral Link</button>
<button class="green" onclick="shareWhatsApp()">💬 Share on WhatsApp</button>

<div class="grid">
  <div class="card"><div id="totalRef">0</div><p>Total Referrals</p></div>
  <div class="card"><div id="totalEarned">₦0</div><p>Total Earned</p></div>
  <div class="card"><div id="wallet">₦0</div><p>Wallet Balance</p></div>
  <div class="card"><div id="pending">₦0</div><p>Pending Bonus</p></div>
</div>

<h3>1. Share your link</h3>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // TODO: PASTE YOUR FIREBASE CONFIG HERE
  const firebaseConfig = {
    apiKey: "AIzaSyCVExwvLDwVmMJ6XbyTCrY1IyMqyhiuLbo",
      authDomain: "earnspherehub-742e9.firebaseapp.com",
      projectId: "earnspherehub-742e9",
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth();
  const db = getFirestore();

  let userData = {};
  let referralLink = "";

  function generateCode(uid) {
    return "ESH-" + uid.slice(0,6).toUpperCase() + Math.floor(Math.random()*1000);
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) return window.location.href = "login.html";
    
    const userRef = doc(db, "users", user.uid);
    const snap = await getDoc(userRef);

    if (snap.exists()) {
      userData = snap.data();
      // Create code if it doesn't exist
      if (!userData.referralCode) {
        const newCode = generateCode(user.uid);
        await updateDoc(userRef, { referralCode: newCode, totalReferrals: 0 });
        userData.referralCode = newCode;
      }
    } else {
      // First time user doc
      const newCode = generateCode(user.uid);
      await setDoc(userRef, { 
        email: user.email, 
        referralCode: newCode, 
        totalReferrals: 0, 
        wallet: 0,
        totalEarned: 0,
        pendingBonus: 0
      });
      userData = { referralCode: newCode };
    }

    referralLink = `https://earnspherehub.name.ng/register.html?ref=${userData.referralCode}`;
    
    document.getElementById("refCode").innerText = userData.referralCode;
    document.getElementById("refLink").innerText = referralLink;
    document.getElementById("totalRef").innerText = userData.totalReferrals || 0;
    document.getElementById("totalEarned").innerText = `₦${userData.totalEarned || 0}`;
    document.getElementById("wallet").innerText = `₦${userData.wallet || 0}`;
    document.getElementById("pending").innerText = `₦${userData.pendingBonus || 0}`;
  });

  window.copyLink = () => {
    navigator.clipboard.writeText(referralLink);
    alert("Referral link copied!");
  }

  window.shareWhatsApp = () => {
    const msg = `Join EarnSphereHub and we both get ₦300! Use my link: ${referralLink}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
  }

</script>
</body>
</html>
