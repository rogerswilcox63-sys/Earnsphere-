<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - EarnSphereHub</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 420px;
      width: 100%;
      background: rgba(30,41,59,0.8);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 32px 24px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .logo {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }
    h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .referral-badge {
      background: rgba(16,185,129,0.15);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      text-align: center;
      margin-bottom: 20px;
    }
    .referral-badge .label {
      color: #94a3b8;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .referral-badge .code {
      color: #4ade80;
      font-size: 20px;
      font-weight: 700;
      font-family: monospace;
      margin-top: 2px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      color: #cbd5e1;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #3b82f6;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      color: #fff;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(59,130,246,0.4);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .btn-google {
      background: #fff;
      color: #0f172a;
      margin-top: 8px;
    }
    .btn-google:hover {
      background: #e2e8f0;
      box-shadow: 0 4px 20px rgba(255,255,255,0.2);
    }
    .divider {
      text-align: center;
      color: #64748b;
      font-size: 13px;
      margin: 16px 0;
      position: relative;
    }
    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #334155;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .login-link {
      text-align: center;
      margin-top: 16px;
      color: #94a3b8;
      font-size: 14px;
    }
    .login-link a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
    }
    .login-link a:hover { text-decoration: underline; }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e293b;
      border: 1px solid #334155;
      color: #f1f5f9;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
      z-index: 999;
      max-width: 90%;
      font-weight: 500;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }
    .toast.success { border-left: 4px solid #22c55e; }
    .toast.error { border-left: 4px solid #ef4444; }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">💰 EarnSphere</div>
    <h1>Create Account</h1>
    <p class="subtitle">Join and start earning today</p>

    <!-- Referral Code Display -->
    <div class="referral-badge" id="referralBadge">
      <div class="label">Referred by</div>
      <div class="code" id="referralCodeDisplay">—</div>
    </div>

    <form id="registerForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="Enter your full name" required />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Create a password" required />
      </div>
      <button type="submit" class="btn" id="registerBtn">Create Account</button>
    </form>

    <div class="divider">or</div>

    <button class="btn btn-google" onclick="signInWithGoogle()">
      <i class="fab fa-google"></i> Continue with Google
    </button>

    <div class="login-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyCVExwvLDwVmMJ6XbyTCrY1IyMqyhiuLbo",
      authDomain: "earnspherehub-742e9.firebaseapp.com",
      projectId: "earnspherehub-742e9",
      storageBucket: "earnspherehub-742e9.firebasestorage.app",
      messagingSenderId: "173538573377",
      appId: "1:173538573377:web:6d8c748376afcb9096dac0",
      measurementId: "G-3ZXY33620J"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // DOM refs
    const form = document.getElementById('registerForm');
    const registerBtn = document.getElementById('registerBtn');
    const referralCodeDisplay = document.getElementById('referralCodeDisplay');
    const toast = document.getElementById('toast');

    // Get referral code from URL
    const urlParams = new URLSearchParams(window.location.search);
    const referralCode = urlParams.get('ref');

    // Display referral code
    if (referralCode) {
      referralCodeDisplay.textContent = referralCode;
      localStorage.setItem('referral_code', referralCode);
    } else {
      // Check if referral code was stored earlier
      const storedCode = localStorage.getItem('referral_code');
      if (storedCode) {
        referralCodeDisplay.textContent = storedCode;
      } else {
        referralCodeDisplay.textContent = 'Direct Signup (No Referral)';
        referralCodeDisplay.style.color = '#94a3b8';
      }
    }

    function showToast(msg, type = 'success') {
      toast.textContent = msg;
      toast.className = `toast ${type}`;
      void toast.offsetWidth;
      toast.classList.add('show');
      clearTimeout(toast._hide);
      toast._hide = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Handle registration
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!fullName || !email || !password) {
        showToast('Please fill in all fields', 'error');
        return;
      }

      if (password.length < 6) {
        showToast('Password must be at least 6 characters', 'error');
        return;
      }

      registerBtn.disabled = true;
      registerBtn.textContent = 'Creating account...';

      try {
        // Create user
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        // Update profile
        await user.updateProfile({
          displayName: fullName
        });

        // Get referral code from URL or localStorage
        const refCode = referralCode || localStorage.getItem('referral_code') || null;

        // Save user data to Firestore
        const userData = {
          uid: user.uid,
          email: email,
          displayName: fullName,
          referralCode: `ESH-${user.uid.slice(0,6).toUpperCase()}${Math.floor(Math.random() * 9000 + 1000)}`,
          referredBy: refCode || null,
          balance: 0,
          lifetimeTotal: 0,
          successfulTaskCount: 0,
          completedTaskIds: [],
          totalReferrals: 0,
          totalEarned: 0,
          pendingBonus: 0,
          wallet: 0,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        await db.collection('users').doc(user.uid).set(userData);

        // If referred by someone, credit the referrer
        if (refCode) {
          try {
            // Find the referrer by their referral code
            const usersRef = db.collection('users');
            const querySnapshot = await usersRef.where('referralCode', '==', refCode).get();
            
            if (!querySnapshot.empty) {
              const referrerDoc = querySnapshot.docs[0];
              const referrerData = referrerDoc.data();
              const referrerRef = usersRef.doc(referrerDoc.id);

              // Update referrer's stats
              await referrerRef.update({
                totalReferrals: firebase.firestore.FieldValue.increment(1),
                pendingBonus: firebase.firestore.FieldValue.increment(300),
                totalEarned: firebase.firestore.FieldValue.increment(300)
              });

              console.log(`✅ Referrer ${referrerData.email} credited!`);
            }
          } catch (refError) {
            console.warn('Referral credit error:', refError);
          }
        }

        showToast('✅ Account created successfully!', 'success');
        
        // Redirect to dashboard
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);

      } catch (err) {
        console.error('Registration error:', err);
        let errorMsg = 'Registration failed. Please try again.';
        if (err.code === 'auth/email-already-in-use') {
          errorMsg = 'Email already registered. Please login.';
        } else if (err.code === 'auth/weak-password') {
          errorMsg = 'Password is too weak. Use at least 6 characters.';
        }
        showToast('❌ ' + errorMsg, 'error');
        registerBtn.disabled = false;
        registerBtn.textContent = 'Create Account';
      }
    });

    // Google Sign In
    async function signInWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      
      try {
        const result = await auth.signInWithPopup(provider);
        const user = result.user;
        
        // Check if user exists in Firestore
        const userRef = db.collection('users').doc(user.uid);
        const doc = await userRef.get();
        
        if (!doc.exists) {
          // New user - create document
          const refCode = referralCode || localStorage.getItem('referral_code') || null;
          
          const userData = {
            uid: user.uid,
            email: user.email,
            displayName: user.displayName || 'User',
            referralCode: `ESH-${user.uid.slice(0,6).toUpperCase()}${Math.floor(Math.random() * 9000 + 1000)}`,
            referredBy: refCode || null,
            balance: 0,
            lifetimeTotal: 0,
            successfulTaskCount: 0,
            completedTaskIds: [],
            totalReferrals: 0,
            totalEarned: 0,
            pendingBonus: 0,
            wallet: 0,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          };
          
          await userRef.set(userData);
          
          // Credit referrer
          if (refCode) {
            try {
              const usersRef = db.collection('users');
              const querySnapshot = await usersRef.where('referralCode', '==', refCode).get();
              
              if (!querySnapshot.empty) {
                const referrerDoc = querySnapshot.docs[0];
                const referrerRef = usersRef.doc(referrerDoc.id);
                await referrerRef.update({
                  totalReferrals: firebase.firestore.FieldValue.increment(1),
                  pendingBonus: firebase.firestore.FieldValue.increment(300),
                  totalEarned: firebase.firestore.FieldValue.increment(300)
                });
              }
            } catch (refError) {
              console.warn('Referral credit error:', refError);
            }
          }
        }
        
        showToast('✅ Welcome back!', 'success');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1000);
        
      } catch (err) {
        console.error('Google sign-in error:', err);
        showToast('❌ Google sign-in failed: ' + err.message, 'error');
      }
    }

    // Check if already logged in
    auth.onAuthStateChanged((user) => {
      if (user) {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
