    // ===== HELPERS =====
    function showToast(msg, isError = true) {
      toast.textContent = msg;
      toast.className = 'toast' + (isError ? '' : ' success');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + 'B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(0) + 'KB';
      return (bytes / 1048576).toFixed(1) + 'MB';
    }

    function getFileIcon(mimeType) {
      if (mimeType && mimeType.startsWith('image/')) return 'fa-image';
      if (mimeType === 'application/pdf') return 'fa-file-pdf';
      if (mimeType && (mimeType.includes('word') || mimeType.includes('doc'))) return 'fa-file-word';
      if (mimeType && (mimeType.includes('excel') || mimeType.includes('sheet'))) return 'fa-file-excel';
      if (mimeType && (mimeType.includes('presentation') || mimeType.includes('ppt'))) return 'fa-file-powerpoint';
      if (mimeType && mimeType.startsWith('video/')) return 'fa-file-video';
      if (mimeType && mimeType.startsWith('text/')) return 'fa-file-alt';
      return 'fa-file';
    }

    function isImageType(mimeType) { return mimeType && mimeType.startsWith('image/'); }
    function isVideoType(mimeType) { return mimeType && mimeType.startsWith('video/'); }
    function getAttachmentType(mimeType) {
      if (isImageType(mimeType)) return 'image';
      if (isVideoType(mimeType)) return 'video';
      return 'file';
    }

    function getSessionTitle(messages) {
      if (!messages || messages.length === 0) return 'New Chat';
      const first = messages[0];
      const text = first.text || 'New Chat';
      return text.length > 30 ? text.substring(0, 30) + '…' : text;
    }

    // ===== RENDER ATTACHMENT PREVIEW =====
    function renderAttachmentPreview() {
      if (attachments.length === 0) { attachmentPreview.innerHTML = ''; return; }
      attachmentPreview.innerHTML = attachments.map((att, idx) => {
        let previewHtml = '';
        if (att.type && att.type.startsWith('image/')) {
          previewHtml = `<img src="${att.dataURL}" alt="${att.name}" />`;
        } else if (att.type && att.type.startsWith('video/')) {
          previewHtml = `<i class="fas fa-file-video" style="font-size:1.2rem;color:#f59e0b;"></i>`;
        } else {
          const icon = getFileIcon(att.type);
          previewHtml = `<i class="fas ${icon}"></i>`;
        }
        return `
          <div class="file-chip">
            ${previewHtml}
            <span>${att.name}</span>
            <span class="remove" data-index="${idx}"><i class="fas fa-times"></i></span>
          </div>
        `;
      }).join('');
      attachmentPreview.querySelectorAll('.remove').forEach(el => {
        el.addEventListener('click', (e) => {
          const idx = parseInt(el.dataset.index);
          attachments.splice(idx, 1);
          renderAttachmentPreview();
        });
      });
    }

    // ===== ADD MESSAGE TO DOM =====
    function addMessageToDOM(text, sender = 'user', attachmentsList = null, timestamp = null, generated = null) {
      const div = document.createElement('div');
      div.className = `msg ${sender}`;

      if (text) {
        const textNode = document.createTextNode(text);
        div.appendChild(textNode);
      }

      if (generated) {
        if (generated.type === 'image') {
          const container = document.createElement('div');
          container.className = 'generated-image';
          const img = document.createElement('img');
          img.src = generated.url;
          img.alt = 'Generated Image';
          img.onerror = function() {
            this.style.display = 'none';
            const fallback = document.createElement('p');
            fallback.style.color = '#94a3b8';
            fallback.textContent = '⚠️ Image failed to load. Click download link below.';
            container.appendChild(fallback);
          };
          container.appendChild(img);
          div.appendChild(container);
          if (generated.prompt) {
            const label = document.createElement('div');
            label.className = 'prompt-label';
            label.textContent = `📝 ${generated.prompt}`;
            div.appendChild(label);
          }
          const download = document.createElement('a');
          download.href = generated.url;
          download.download = 'generated-image.png';
          download.className = 'download-link';
          download.textContent = '📥 Download Image';
          div.appendChild(download);
        } else if (generated.type === 'video') {
          const container = document.createElement('div');
          container.className = 'generated-video';
          const video = document.createElement('video');
          video.src = generated.url;
          video.controls = true;
          video.style.width = '100%';
          video.style.maxHeight = '300px';
          video.style.borderRadius = '8px';
          container.appendChild(video);
          div.appendChild(container);
          if (generated.prompt) {
            const label = document.createElement('div');
            label.className = 'prompt-label';
            label.textContent = `📝 ${generated.prompt}`;
            div.appendChild(label);
          }
          const download = document.createElement('a');
          download.href = generated.url;
          download.download = 'generated-video.mp4';
          download.className = 'download-link';
          download.textContent = '📥 Download Video';
          div.appendChild(download);
        }
      }

      if (attachmentsList && attachmentsList.length > 0) {
        const attachContainer = document.createElement('div');
        attachContainer.className = 'attachments';
        attachmentsList.forEach(att => {
          const item = document.createElement('div');
          item.className = 'attach-item';
          const attType = getAttachmentType(att.type);
          if (attType === 'image') {
            const img = document.createElement('img');
            img.src = att.dataURL || att.url || '';
            img.alt = att.name;
            item.appendChild(img);
            item.addEventListener('click', () => window.open(img.src, '_blank'));
          } else if (attType === 'video') {
            const video = document.createElement('video');
            video.src = att.dataURL || att.url || '';
            video.controls = true;
            video.style.width = '120px';
            video.style.height = '80px';
            video.style.objectFit = 'cover';
            video.style.borderRadius = '4px';
            item.appendChild(video);
          } else {
            const icon = document.createElement('i');
            icon.className = `fas ${getFileIcon(att.type)}`;
            item.appendChild(icon);
          }
          const nameSpan = document.createElement('span');
          nameSpan.className = 'name';
          nameSpan.textContent = att.name;
          item.appendChild(nameSpan);
          const sizeSpan = document.createElement('span');
          sizeSpan.className = 'size';
          sizeSpan.textContent = formatFileSize(att.size || 0);
          item.appendChild(sizeSpan);
          item.addEventListener('click', () => {
            if (att.dataURL) {
              const a = document.createElement('a');
              a.href = att.dataURL;
              a.download = att.name;
              a.click();
            }
          });
          attachContainer.appendChild(item);
        });
        div.appendChild(attachContainer);
      }

      const time = document.createElement('span');
      time.className = 'time';
      const ts = timestamp ? new Date(timestamp) : new Date();
      time.textContent = ts.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      div.appendChild(time);

      const placeholder = document.getElementById('loadingPlaceholder');
      if (placeholder) placeholder.remove();

      messagesWrapper.appendChild(div);
      messagesWrapper.scrollTop = messagesWrapper.scrollHeight;
    }

    // ===== SESSION MANAGEMENT =====
    async function createNewSession() {
      if (!currentUser) return null;
      const newDoc = {
        userId: currentUser.uid,
        title: 'New Chat',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        messages: []
      };
      const docRef = await db.collection(COLLECTION_NAME).add(newDoc);
      return docRef.id;
    }

    async function saveMessageToSession(sessionId, role, text, attachmentsList = null, generated = null) {
      if (!sessionId || !currentUser) return;
      const msg = {
        role: role,
        text: text || '',
        attachments: attachmentsList || [],
        generated: generated || null,
        timestamp: Date.now()
      };
      const docRef = db.collection(COLLECTION_NAME).doc(sessionId);
      await docRef.update({
        messages: firebase.firestore.FieldValue.arrayUnion(msg),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }

    async function loadSession(sessionId) {
      if (!sessionId) return;
      try {
        const doc = await db.collection(COLLECTION_NAME).doc(sessionId).get();
        if (!doc.exists) return;
        const data = doc.data();
        if (data.userId !== currentUser.uid) {
          showToast('You do not have access to this session.');
          return;
        }
        messagesWrapper.innerHTML = '';
        const messages = data.messages || [];
        currentSessionMessages = messages;
        currentSessionId = sessionId;
        if (messages.length === 0) {
          const welcome = { role: 'bot', text: '👋 How you dey? I\'m SphereAI...', attachments: [], timestamp: Date.now() };
          currentSessionMessages.push(welcome);
          addMessageToDOM(welcome.text, 'bot', welcome.attachments, welcome.timestamp);
          await saveMessageToSession(sessionId, 'bot', welcome.text, []);
        } else {
          messages.forEach(msg => {
            const generated = msg.generated || null;
            addMessageToDOM(msg.text, msg.role, msg.attachments || [], msg.timestamp, generated);
          });
        }
      } catch (e) {
        console.error('Error loading session:', e);
        showToast('Could not load chat session.');
      }
    }

    async function deleteSession(sessionId) {
      if (!sessionId) return;
      if (!confirm('Delete this chat session?')) return;
      try {
        await db.collection(COLLECTION_NAME).doc(sessionId).delete();
        if (currentSessionId === sessionId) await startNewChat();
        loadSessionList();
        showToast('Session deleted.', false);
      } catch (e) { showToast('Error deleting session.'); }
    }

    async function clearAllHistory() {
      if (!confirm('Delete ALL chat history? This cannot be undone.')) return;
      try {
        const snapshot = await db.collection(COLLECTION_NAME)
          .where('userId', '==', currentUser.uid)
          .get();
        const batch = db.batch();
        snapshot.docs.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
        await startNewChat();
        loadSessionList();
        showToast('All chat history cleared.', false);
      } catch (e) { showToast('Error clearing history.'); }
    }

    async function loadSessionList() {
      if (!currentUser) return;
      try {
        const snapshot = await db.collection(COLLECTION_NAME)
          .where('userId', '==', currentUser.uid)
          .orderBy('updatedAt', 'desc')
          .get();
        if (snapshot.empty) {
          sessionList.innerHTML = `<div class="empty-history">No chat sessions yet. Start a new chat!</div>`;
          return;
        }
        let html = '';
        snapshot.forEach(doc => {
          const data = doc.data();
          const title = data.title || 'New Chat';
          const date = data.updatedAt ? data.updatedAt.toDate().toLocaleString() : 'Just now';
          const preview = data.messages && data.messages.length > 0 ?
            (data.messages[0].text || '') : '';
          html += `
            <div class="session-item" data-id="${doc.id}">
              <div class="title">${title}</div>
              <div class="date">${date}</div>
              <div class="preview">${preview.substring(0, 50)}${preview.length > 50 ? '…' : ''}</div>
              <button class="delete-session" data-id="${doc.id}"><i class="fas fa-trash-alt"></i></button>
            </div>
          `;
        });
        sessionList.innerHTML = html;

        sessionList.querySelectorAll('.session-item').forEach(el => {
          el.addEventListener('click', (e) => {
            if (e.target.closest('.delete-session')) return;
            const id = el.dataset.id;
            closeSidebarPanel();
            loadSession(id);
          });
        });
        sessionList.querySelectorAll('.delete-session').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = btn.dataset.id;
            deleteSession(id);
          });
        });
      } catch (e) {
        console.error('Error loading session list:', e);
        sessionList.innerHTML = `<div class="empty-history">Error loading sessions.</div>`;
      }
    }

    async function startNewChat() {
      messagesWrapper.innerHTML = '';
      currentSessionMessages = [];
      const newId = await createNewSession();
      if (newId) {
        currentSessionId = newId;
        const welcome = {
          role: 'bot',
          text: '👋 How you dey? I\'m SphereAI, your personal hustler assistant. Ask me anything about earning, tasks, or just talk! No wahala.',
          attachments: [],
          timestamp: Date.now()
        };
        currentSessionMessages.push(welcome);
        addMessageToDOM(welcome.text, 'bot', welcome.attachments, welcome.timestamp);
        await saveMessageToSession(newId, 'bot', welcome.text, []);
        await updateSessionTitle(newId, 'New Chat');
      } else {
        showToast('Could not create new chat session.');
      }
      closeSidebarPanel();
    }

    async function updateSessionTitle(sessionId, title) {
      try {
        await db.collection(COLLECTION_NAME).doc(sessionId).update({ title });
      } catch (e) { /* ignore */ }
    }

    // ===== SEND MESSAGE =====
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text && attachments.length === 0) {
        showToast('Please type a message or attach something.', false);
        return;
      }
      if (isSending) return;
      isSending = true;

      sendBtn.disabled = true;
      messageInput.disabled = true;

      if (!currentSessionId) {
        const newId = await createNewSession();
        if (newId) {
          currentSessionId = newId;
          messagesWrapper.innerHTML = '';
          currentSessionMessages = [];
        } else {
          showToast('Failed to create new session.');
          isSending = false;
          sendBtn.disabled = false;
          messageInput.disabled = false;
          return;
        }
      }

      const attachCopy = attachments.map(a => ({
        name: a.name,
        size: a.size,
        type: a.type,
        dataURL: a.dataURL || null
      }));

      const imageAttachment = attachments.find(a => a.type && a.type.startsWith('image/'));
      const imageData = imageAttachment ? imageAttachment.dataURL : null;

      const displayText = text || (attachments.length > 0 ? '📎 Attached file' : '');
      addMessageToDOM(displayText, 'user', attachCopy);
      currentSessionMessages.push({ role: 'user', text: displayText, attachments: attachCopy, timestamp: Date.now() });
      await saveMessageToSession(currentSessionId, 'user', displayText, attachCopy);

      messageInput.value = '';
      messageInput.style.height = 'auto';
      attachments = [];
      renderAttachmentPreview();

      if (currentSessionMessages.length === 1) {
        const title = getSessionTitle(currentSessionMessages);
        await updateSessionTitle(currentSessionId, title);
        loadSessionList();
      }

      showTyping();

      try {
        const history = currentSessionMessages.slice(-10).map(h => ({
          role: h.role,
          text: h.text || ''
        }));

        const payload = {
          message: text || 'I sent an attachment.',
          history: history,
          image: imageData || null
        };

        const response = await fetch(`${API_BASE_URL}/api/grok`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        hideTyping();

        if (!response.ok) {
          const errMsg = data.error || `Server error (${response.status})`;
          const reply = `😅 Oops! My brain no dey work right now. ${errMsg} No wahala, I go soon reset.`;
          addMessageToDOM(reply, 'bot');
          currentSessionMessages.push({ role: 'bot', text: reply, attachments: [], timestamp: Date.now() });
          await saveMessageToSession(currentSessionId, 'bot', reply, []);
          return;
        }

        const reply = data.reply || 'I no get response o, but I dey try!';
        addMessageToDOM(reply, 'bot');
        currentSessionMessages.push({ role: 'bot', text: reply, attachments: [], timestamp: Date.now() });
        await saveMessageToSession(currentSessionId, 'bot', reply, []);

      } catch (error) {
        hideTyping();
        const reply = `😅 Oops! My brain no dey work right now. ${error.message || 'Try again later.'} No wahala, I go soon reset.`;
        addMessageToDOM(reply, 'bot');
        currentSessionMessages.push({ role: 'bot', text: reply, attachments: [], timestamp: Date.now() });
        await saveMessageToSession(currentSessionId, 'bot', reply, []);
      } finally {
        isSending = false;
        sendBtn.disabled = false;
        messageInput.disabled = false;
        messageInput.focus();
      }
    }

    // ===== CLEAR CURRENT CHAT =====
    async function clearCurrentChat() {
      if (!confirm('Clear this chat session?')) return;
      await startNewChat();
      loadSessionList();
    }

    // ===== TYPING INDICATOR =====
    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing-indicator';
      div.id = 'typingIndicator';
      div.innerHTML = `
        SphereAI is thinking
        <span class="dots">
          <span></span><span></span><span></span>
        </span>
      `;
      messagesWrapper.appendChild(div);
      messagesWrapper.scrollTop = messagesWrapper.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    // ===== SIDEBAR =====
    function openSidebar() {
      sidebar.classList.add('open');
      overlay.classList.add('active');
      loadSessionList();
    }

    function closeSidebarPanel() {
      sidebar.classList.remove('open');
      overlay.classList.remove('active');
    }

    // ===== HANDLE FILE ATTACHMENTS =====
    function handleFile(file, isImage = false, isVideo = false) {
      const allowedImageTypes = ['image/png', 'image/jpeg', 'image/gif', 'image/webp', 'image/heic'];
      const allowedVideoTypes = ['video/mp4', 'video/webm', 'video/ogg', 'video/quicktime'];

      if (isImage && !allowedImageTypes.includes(file.type)) {
        showToast('⚠️ Please select a valid image (PNG, JPG, GIF, WEBP).');
        return false;
      }
      if (isVideo && !allowedVideoTypes.includes(file.type)) {
        showToast('⚠️ Please select a valid video (MP4, WEBM, OGG).');
        return false;
      }

      const maxSize = isVideo ? 10 * 1024 * 1024 : 5 * 1024 * 1024;
      if (file.size > maxSize) {
        showToast(`⚠️ File too large: ${file.name} (max ${maxSize/1048576}MB)`);
        return false;
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        const dataURL = e.target.result;
        attachments.push({
          name: file.name,
          size: file.size,
          type: file.type,
          dataURL: dataURL
        });
        renderAttachmentPreview();
      };
      reader.readAsDataURL(file);
      return true;
    }

    // ===== GENERATION FUNCTIONS (call backend) =====
    async function generateImage(prompt) {
      try {
        const response = await fetch(`${API_BASE_URL}/api/generate-image`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
        const data = await response.json();
        if (data.status && data.url) {
          return { url: data.url, prompt: data.prompt };
        } else {
          throw new Error(data.error || 'Image generation failed');
        }
      } catch (e) {
        console.error(e);
        showToast('Image generation failed: ' + e.message);
        return null;
      }
    }

    async function generateVideo(prompt) {
      try {
        const response = await fetch(`${API_BASE_URL}/api/generate-video`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
        const data = await response.json();
        if (data.status && data.url) {
          return { url: data.url, prompt: data.prompt };
        } else {
          throw new Error(data.error || 'Video generation failed');
        }
      } catch (e) {
        console.error(e);
        showToast('Video generation failed: ' + e.message);
        return null;
      }
    }

    async function handleGenerate(mode) {
      const prompt = genPromptInput.value.trim();
      if (!prompt) {
        showToast('Please enter a prompt.');
        return;
      }
      genSubmit.disabled = true;
      genSubmit.textContent = 'Generating...';

      let result = null;
      if (mode === 'image') {
        result = await generateImage(prompt);
      } else if (mode === 'video') {
        result = await generateVideo(prompt);
      }

      genSubmit.disabled = false;
      genSubmit.textContent = 'Generate';
      if (result) {
        genModal.style.display = 'none';
        const displayText = mode === 'image' ? '🖼️ Generated image:' : '🎬 Generated video:';
        addMessageToDOM(displayText, 'bot', [], Date.now(), { type: mode, url: result.url, prompt: result.prompt });
        const msg = {
          role: 'bot',
          text: displayText,
          attachments: [],
          generated: { type: mode, url: result.url, prompt: result.prompt },
          timestamp: Date.now()
        };
        currentSessionMessages.push(msg);
        await saveMessageToSession(currentSessionId, 'bot', displayText, [], { type: mode, url: result.url, prompt: result.prompt });
      }
      genPromptInput.value = '';
    }

    // ===== EVENT LISTENERS =====
    imageBtn.addEventListener('click', () => imageInput.click());
    imageInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFile(e.target.files[0], true, false);
      }
      imageInput.value = '';
    });

    videoBtn.addEventListener('click', () => videoInput.click());
    videoInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFile(e.target.files[0], false, true);
      }
      videoInput.value = '';
    });

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    messageInput.addEventListener('input', () => {
      messageInput.style.height = 'auto';
      messageInput.style.height = messageInput.scrollHeight + 'px';
    });

    generateImageBtn.addEventListener('click', () => {
      genMode = 'image';
      genModalTitle.textContent = 'Generate Image';
      genModalDesc.textContent = 'Enter a prompt to generate an image.';
      genPromptInput.placeholder = 'e.g. A futuristic city in Nigeria';
      genModal.style.display = 'flex';
      genPromptInput.focus();
    });

    generateVideoBtn.addEventListener('click', () => {
      genMode = 'video';
      genModalTitle.textContent = 'Generate Video';
      genModalDesc.textContent = 'Enter a prompt to generate a short video.';
      genPromptInput.placeholder = 'e.g. A cat playing with a ball in a garden';
      genModal.style.display = 'flex';
      genPromptInput.focus();
    });

    genCancel.addEventListener('click', () => {
      genModal.style.display = 'none';
      genPromptInput.value = '';
    });

    genSubmit.addEventListener('click', () => {
      handleGenerate(genMode);
    });

    genPromptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleGenerate(genMode);
      }
    });

    genModal.addEventListener('click', (e) => {
      if (e.target === genModal) {
        genModal.style.display = 'none';
        genPromptInput.value = '';
      }
    });

    historyBtn.addEventListener('click', openSidebar);
    closeSidebar.addEventListener('click', closeSidebarPanel);
    overlay.addEventListener('click', closeSidebarPanel);
    newChatBtn.addEventListener('click', startNewChat);
    clearBtn.addEventListener('click', clearCurrentChat);
    clearAllHistoryBtn.addEventListener('click', clearAllHistory);

    // Drag and drop
    const chatContainer = document.querySelector('.chat-container');
    chatContainer.addEventListener('dragover', (e) => {
      e.preventDefault();
      chatContainer.style.border = '2px dashed #3b82f6';
    });
    chatContainer.addEventListener('dragleave', (e) => {
      e.preventDefault();
      chatContainer.style.border = 'none';
    });
    chatContainer.addEventListener('drop', (e) => {
      e.preventDefault();
      chatContainer.style.border = 'none';
      if (e.dataTransfer.files.length > 0) {
        const file = e.dataTransfer.files[0];
        if (file.type && file.type.startsWith('image/')) {
          handleFile(file, true, false);
        } else if (file.type && file.type.startsWith('video/')) {
          handleFile(file, false, true);
        } else {
          showToast('⚠️ Only images and videos can be dropped.');
        }
      }
    });

    // ===== LOGOUT =====
    function logout() {
      auth.signOut().then(() => {
        localStorage.removeItem('earnsphere_user_data');
        window.location.href = 'login.html';
      });
    }

    // ===== AUTH =====
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('userName').textContent = user.displayName || user.email || 'User';
        try {
          const snapshot = await db.collection(COLLECTION_NAME)
            .where('userId', '==', user.uid)
            .orderBy('updatedAt', 'desc')
            .limit(1)
            .get();
          if (!snapshot.empty) {
            const doc = snapshot.docs[0];
            await loadSession(doc.id);
          } else {
            await startNewChat();
          }
        } catch (e) {
          await startNewChat();
        }
        loadSessionList();
      } else {
        window.location.href = 'login.html';
      }
    });
  </script>
