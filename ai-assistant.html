<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
      // Using your established EarnSphere configuration setup
      const firebaseConfig = {
        apiKey: "CVExwvLDwVmMJ6XbyTCrY1IyMqyhiuLbo",
        authDomain: "earnspherehub-742e9.firebaseapp.com",
        projectId: "earnspherehub-742e9",
        storageBucket: "earnspherehub-742e9.firebasestorage.app",
        messagingSenderId: "173538573377",
        appId: "1:173538573377:web:6d8c748376afcb9096dac0",
        measurementId: "G-3ZXY33620J"
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnSphere AI Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a; color: #fff; min-height: 100vh;
            display: flex; flex-direction: column;
        }
        .chat-container {
            max-width: 600px; width: 100%; margin: auto;
            background: #1e293b; border: 1px solid #334155;
            height: 85vh; border-radius: 16px; display: flex;
            flex-direction: column; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .chat-header {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 1.2rem; border-bottom: 1px solid #334155;
            display: flex; align-items: center; justify-content: space-between;
        }
        .chat-header h1 { font-size: 1.2rem; display: flex; align-items: center; gap: 0.5rem; }
        .back-link { color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: #fff; }
        
        .chat-box {
            flex: 1; padding: 1.5rem; overflow-y: auto;
            display: flex; flex-direction: column; gap: 1rem;
        }
        .msg { max-width: 80%; padding: 0.8rem 1.1rem; border-radius: 12px; font-size: 0.95rem; line-height: 1.4; }
        .msg.user { background: #3b82f6; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.ai { background: #0f172a; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #334155; }
        
        .chat-input-area {
            padding: 1rem; background: #0f172a; border-top: 1px solid #334155;
            display: flex; gap: 0.5rem;
        }
        .chat-input-area input {
            flex: 1; background: #1e293b; border: 1px solid #334155;
            padding: 0.8rem; border-radius: 8px; color: #fff; font-size: 1rem;
        }
        .chat-input-area input:focus { outline: none; border-color: #3b82f6; }
        .send-btn {
            background: #3b82f6; color: white; border: none; padding: 0 1.2rem;
            border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s;
        }
        .send-btn:hover { background: #2563eb; }
        .send-btn:disabled { background: #4b5563; cursor: not-allowed; }
    </style>
</head>
<body>

    <div style="padding: 10px; text-align: center;">
        <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <h1><i class="fas fa-robot" style="color: #3b82f6;"></i> SphereAI Engine</h1>
            <span style="font-size: 0.75rem; color: #10b981;"><i class="fas fa-circle"></i> Online</span>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="msg ai">Hello! I am your custom EarnSphere AI assistant. How can I help you today?</div>
        </div>

        <form class="chat-input-area" id="chatForm">
            <input type="text" id="userInput" placeholder="Ask me anything..." required autocomplete="off">
            <button type="submit" class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </form>
    </div>

    <script>
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        const sendBtn = document.getElementById('sendBtn');

        // SECURELY FETCH THE ACTIVE API CONTEXT PASSED FROM BASE REPOSITORIES
        const GENAI_KEY ="CVExwvLDwVmMJ6XbyTCrY1IyMqyhiuLbo"; 

        // Session Protection Security Layer
        auth.onAuthStateChanged((user) => {
            if (!user && !localStorage.getItem('currentUser')) {
                window.location.href = 'login.html';
            }
        });

        chatForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const prompt = userInput.value.trim();
            if (!prompt) return;

            // 1. Render User Message inside Interface DOM
            appendMessage(prompt, 'user');
            userInput.value = '';
            
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            // 2. Open Temporary Typing Node for the System Engine
            const typingIndicator = appendMessage('Thinking...', 'ai');

            try {
                // 3. Make real-time HTTP Request payload to Google's production Gemini API endpoints
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GENAI_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                
                // 4. Extract generated textual content context parameters safely
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    typingIndicator.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    typingIndicator.innerText = "I received an unparseable response payload structure. Please verify parameters.";
                }

            } catch (err) {
                console.error("AI Communication Error: ", err);
                typingIndicator.innerText = "Network pipeline error. Unable to establish a connection with the processing engine.";
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
                chatBox.scrollTop = chatBox.scrollHeight; // Auto scrolls down to match stream lines
            }
        });

        function appendMessage(text, sender) {
            const el = document.createElement('div');
            el.className = `msg ${sender}`;
            el.innerText = text;
            chatBox.appendChild(el);
            chatBox.scrollTop = chatBox.scrollHeight;
            return el;
        }
    </script>
</body>
</html>
