<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>SphereAI - EarnSphere Nigeria</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 50%, rgba(59,130,246,.08) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(16,185,129,.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ----- NAVBAR ----- */
    .navbar {
      background: rgba(30,41,59,.8);
      backdrop-filter: blur(12px);
      padding: 0.8rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,.08);
      position: relative;
      z-index: 10;
    }
    .nav-links {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .nav-links a {
      text-decoration: none;
      color: #cbd5e1;
      font-weight: 500;
      padding: 0.4rem 0.9rem;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      transition: all 0.3s;
    }
    .nav-links a:hover,
    .nav-links a.active {
      color: #3b82f6;
      background: rgba(59,130,246,.15);
    }
    .logo {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo i { margin-right: 0.3rem; }
    .user-greeting {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .user-greeting span {
      font-size: 0.9rem;
      color: #94a3b8;
    }
    .logout-btn {
      background: rgba(59,130,246,.2);
      border: 1px solid rgba(59,130,246,.3);
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      font-weight: 500;
      color: #3b82f6;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.3s;
    }
    .logout-btn:hover { background: rgba(59,130,246,.3); }

    /* ----- CHAT CONTAINER ----- */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      margin: 1.5rem auto;
      padding: 0 1.5rem;
      width: 100%;
      position: relative;
      z-index: 1;
      height: calc(100vh - 90px);
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255,255,255,.06);
      flex-shrink: 0;
    }
    .chat-header .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: #fff;
      flex-shrink: 0;
    }
    .chat-header .info h1 { font-size: 1.2rem; font-weight: 700; }
    .chat-header .info p { font-size: 0.8rem; color: #94a3b8; }
    .chat-header .status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: #10b981;
    }
    .chat-header .status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* ----- MESSAGES ----- */
    .messages-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem 0.5rem 0.5rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      scroll-behavior: smooth;
    }
    .messages-wrapper::-webkit-scrollbar { width: 5px; }
    .messages-wrapper::-webkit-scrollbar-track { background: rgba(255,255,255,.03); border-radius: 10px; }
    .messages-wrapper::-webkit-scrollbar-thumb { background: rgba(59,130,246,.3); border-radius: 10px; }

    .msg {
      max-width: 80%;
      padding: 0.8rem 1.2rem;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 0.95rem;
      word-wrap: break-word;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg.user {
      align-self: flex-end;
      background: #3b82f6;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      align-self: flex-start;
      background: rgba(255,255,255,.08);
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }
    .msg .time {
      font-size: 0.65rem;
      color: rgba(255,255,255,.5);
      display: block;
      margin-top: 4px;
    }
    .msg .attachment {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,.2);
      padding: 6px 12px 6px 8px;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
      max-width: 100%;
    }
    .msg .attachment:hover { background: rgba(0,0,0,.35); }
    .msg .attachment img {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 4px;
      background: #1e293b;
    }
    .msg .attachment i {
      font-size: 1.5rem;
      color: #94a3b8;
    }
    .msg .attachment .name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .msg .attachment .size {
      color: #94a3b8;
      font-size: 0.7rem;
    }

    /* ----- INPUT AREA ----- */
    .input-area {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0.8rem 0 1.2rem;
      border-top: 1px solid rgba(255,255,255,.06);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }
    .input-row textarea {
      flex: 1;
      background: rgba(15,23,42,.6);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      color: #f1f5f9;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      resize: none;
      min-height: 48px;
      max-height: 150px;
      outline: none;
      transition: border 0.2s;
      line-height: 1.5;
    }
    .input-row textarea:focus { border-color: #3b82f6; }
    .input-row textarea::placeholder { color: #64748b; }

    .input-row .btn-icon {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .input-row .btn-icon:hover {
      background: rgba(255,255,255,.12);
      color: #f1f5f9;
    }
    .input-row .btn-icon.send {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border: none;
      color: #fff;
    }
    .input-row .btn-icon.send:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(59,130,246,.3);
    }
    .input-row .btn-icon.send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Attachment preview area */
    .attachment-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 4px 0 0 0;
    }
    .attachment-preview .file-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.06);
      padding: 4px 10px 4px 6px;
      border-radius: 20px;
      font-size: 0.8rem;
      border: 1px solid rgba(255,255,255,.06);
    }
    .attachment-preview .file-chip img {
      width: 28px;
      height: 28px;
      object-fit: cover;
      border-radius: 4px;
    }
    .attachment-preview .file-chip i {
      font-size: 1.2rem;
      color: #94a3b8;
    }
    .attachment-preview .file-chip .remove {
      cursor: pointer;
      color: #ef4444;
      font-size: 0.8rem;
      margin-left: 4px;
    }
    .attachment-preview .file-chip .remove:hover { color: #f87171; }

    /* ----- TYPING INDICATOR ----- */
    .typing-indicator {
      align-self: flex-start;
      background: rgba(255,255,255,.06);
      padding: 10px 16px;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #94a3b8;
      font-size: 0.9rem;
      animation: fadeIn 0.3s ease;
    }
    .typing-indicator .dots {
      display: flex;
      gap: 3px;
    }
    .typing-indicator .dots span {
      width: 6px;
      height: 6px;
      background: #94a3b8;
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }
    .typing-indicator .dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ----- RESPONSIVE ----- */
    @media (max-width: 768px) {
      .navbar { padding: 0.6rem 1rem; }
      .nav-links a { font-size: 0.8rem; padding: 0.3rem 0.6rem; }
      .logo { font-size: 1.1rem; }
      .chat-container { padding: 0 1rem; height: calc(100vh - 80px); }
      .msg { max-width: 90%; font-size: 0.9rem; }
      .input-row textarea { font-size: 0.9rem; }
      .input-row .btn-icon { width: 40px; height: 40px; font-size: 1rem; }
    }
    @media (max-width: 480px) {
      .chat-header .info h1 { font-size: 1rem; }
      .chat-header .info p { font-size: 0.7rem; }
      .chat-header .status { font-size: 0.7rem; }
      .msg { padding: 0.6rem 1rem; }
    }

    /* Toast (for errors) */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #ef4444;
      color: #fff;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 0.9rem;
      box-shadow: 0 8px 30px rgba(0,0,0,.4);
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo"><i class="fas fa-coins"></i> EarnSphere</div>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="withdraw.html">Withdraw</a>
      <a href="profile.html">Profile</a>
      <a href="refer.html">Refer</a>
      <a href="community.html">Community</a>
      <a href="blog.html">Blog</a>
      <a href="ai-assistant.html" class="active"><i class="fas fa-robot"></i> AI Assistant</a>
    </div>
    <div class="user-greeting">
      <span id="userName">Welcome, User</span>
      <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </nav>

  <!-- CHAT CONTAINER -->
  <div class="chat-container">
    <div class="chat-header">
      <div class="avatar"><i class="fas fa-brain"></i></div>
      <div class="info">
        <h1>SphereAI Assistant</h1>
        <p>Your personal hustler helper – online</p>
      </div>
      <div class="status">
        <span class="dot"></span> Active
      </div>
    </div>

    <!-- MESSAGES -->
    <div class="messages-wrapper" id="messagesWrapper">
      <!-- Initial bot message -->
      <div class="msg bot">
        👋 How you dey? I'm SphereAI, your personal hustler assistant. Ask me anything about earning, tasks, or just talk! No wahala.
        <span class="time">Just now</span>
      </div>
    </div>

    <!-- INPUT AREA -->
    <div class="input-area">
      <!-- Attachment preview -->
      <div class="attachment-preview" id="attachmentPreview"></div>

      <div class="input-row">
        <button class="btn-icon" id="attachBtn" title="Attach file">
          <i class="fas fa-paperclip"></i>
        </button>
        <textarea id="messageInput" rows="1" placeholder="Type your message..."></textarea>
        <button class="btn-icon send" id="sendBtn">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Hidden file input -->
  <input type="file" id="fileInput" style="display:none" multiple accept="image/*,.pdf,.doc,.docx,.txt,.xls,.xlsx,.ppt,.pptx" />

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ============================================================
    // FIREBASE CONFIG (same as your app)
    // ============================================================
    const firebaseConfig = {
      apiKey: "AIzaSyCVExwvLDwVmMJ6XbyTCrY1IyMqyhiuLbo",
      authDomain: "earnspherehub-742e9.firebaseapp.com",
      projectId: "earnspherehub-742e9",
      storageBucket: "earnspherehub-742e9.firebasestorage.app",
      messagingSenderId: "173538573377",
      appId: "1:173538573377:web:6d8c748376afcb9096dac0"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // ============================================================
    // DOM REFS
    // ============================================================
    const messagesWrapper = document.getElementById('messagesWrapper');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const attachBtn = document.getElementById('attachBtn');
    const fileInput = document.getElementById('fileInput');
    const attachmentPreview = document.getElementById('attachmentPreview');
    const toast = document.getElementById('toast');

    // ============================================================
    // STATE
    // ============================================================
    let currentUser = null;
    let attachments = []; // each: { file, name, size, type, dataURL? (for image preview) }
    const MAX_FILE_SIZE = 5 * 1024 * 1024; // 5MB
    const API_BASE_URL = 'https://earnsphere-ai.onrender.com'; // live backend

    // ============================================================
    // HELPERS
    // ============================================================
    function showToast(msg, isError = true) {
      toast.textContent = msg;
      toast.style.background = isError ? '#ef4444' : '#10b981';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + 'B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(0) + 'KB';
      return (bytes / 1048576).toFixed(1) + 'MB';
    }

    function getFileIcon(mimeType) {
      if (mimeType.startsWith('image/')) return 'fa-image';
      if (mimeType === 'application/pdf') return 'fa-file-pdf';
      if (mimeType.includes('word') || mimeType.includes('doc')) return 'fa-file-word';
      if (mimeType.includes('excel') || mimeType.includes('sheet')) return 'fa-file-excel';
      if (mimeType.includes('presentation') || mimeType.includes('ppt')) return 'fa-file-powerpoint';
      if (mimeType.startsWith('text/')) return 'fa-file-alt';
      return 'fa-file';
    }

    // ============================================================
    // RENDER ATTACHMENT PREVIEW
    // ============================================================
    function renderAttachmentPreview() {
      if (attachments.length === 0) {
        attachmentPreview.innerHTML = '';
        return;
      }
      attachmentPreview.innerHTML = attachments.map((att, idx) => {
        let previewHtml = '';
        if (att.dataURL) {
          previewHtml = `<img src="${att.dataURL}" alt="${att.name}" />`;
        } else {
          const icon = getFileIcon(att.type);
          previewHtml = `<i class="fas ${icon}"></i>`;
        }
        return `
          <div class="file-chip">
            ${previewHtml}
            <span>${att.name}</span>
            <span class="remove" data-index="${idx}"><i class="fas fa-times"></i></span>
          </div>
        `;
      }).join('');

      // Remove handlers
      attachmentPreview.querySelectorAll('.remove').forEach(el => {
        el.addEventListener('click', (e) => {
          const idx = parseInt(el.dataset.index);
          attachments.splice(idx, 1);
          renderAttachmentPreview();
        });
      });
    }

    // ============================================================
    // ADD MESSAGE TO CHAT
    // ============================================================
    function addMessage(text, sender = 'user', attachmentsList = null) {
      const div = document.createElement('div');
      div.className = `msg ${sender}`;

      // Text
      const textNode = document.createTextNode(text);
      div.appendChild(textNode);

      // Attachments
      if (attachmentsList && attachmentsList.length > 0) {
        attachmentsList.forEach(att => {
          const attachDiv = document.createElement('div');
          attachDiv.className = 'attachment';

          if (att.dataURL) {
            const img = document.createElement('img');
            img.src = att.dataURL;
            img.alt = att.name;
            attachDiv.appendChild(img);
          } else {
            const icon = document.createElement('i');
            icon.className = `fas ${getFileIcon(att.type)}`;
            attachDiv.appendChild(icon);
          }

          const nameSpan = document.createElement('span');
          nameSpan.className = 'name';
          nameSpan.textContent = att.name;
          attachDiv.appendChild(nameSpan);

          const sizeSpan = document.createElement('span');
          sizeSpan.className = 'size';
          sizeSpan.textContent = formatFileSize(att.size);
          attachDiv.appendChild(sizeSpan);

          // Click to download (or open in new tab)
          attachDiv.addEventListener('click', () => {
            if (att.dataURL) {
              const a = document.createElement('a');
              a.href = att.dataURL;
              a.download = att.name;
              a.click();
            } else if (att.file) {
              // For non-image, create a download link
              const a = document.createElement('a');
              a.href = URL.createObjectURL(att.file);
              a.download = att.name;
              a.click();
              setTimeout(() => URL.revokeObjectURL(a.href), 1000);
            }
          });

          div.appendChild(attachDiv);
        });
      }

      // Time
      const time = document.createElement('span');
      time.className = 'time';
      time.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      div.appendChild(time);

      messagesWrapper.appendChild(div);
      messagesWrapper.scrollTop = messagesWrapper.scrollHeight;
    }

    // ============================================================
    // SHOW TYPING INDICATOR
    // ============================================================
    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing-indicator';
      div.id = 'typingIndicator';
      div.innerHTML = `
        SphereAI is thinking
        <span class="dots">
          <span></span><span></span><span></span>
        </span>
      `;
      messagesWrapper.appendChild(div);
      messagesWrapper.scrollTop = messagesWrapper.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    // ============================================================
    // SEND MESSAGE
    // ============================================================
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text && attachments.length === 0) {
        showToast('Please type a message or attach a file.', false);
        return;
      }

      // Disable controls
      sendBtn.disabled = true;
      messageInput.disabled = true;

      // Prepare attachments for display (copy)
      const attachCopy = attachments.map(a => ({
        name: a.name,
        size: a.size,
        type: a.type,
        dataURL: a.dataURL || null,
        file: a.file || null
      }));

      // Add user message with attachments
      const displayText = text || '📎 Attachment';
      addMessage(displayText, 'user', attachCopy);

      // Clear input and attachments
      messageInput.value = '';
      messageInput.style.height = 'auto';
      attachments = [];
      renderAttachmentPreview();

      // Show typing
      showTyping();

      try {
        // Build payload – we only send text (AI doesn't process files yet)
        const payload = { message: text || 'I sent an attachment.' };

        const response = await fetch(`${API_BASE_URL}/api/grok`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        hideTyping();

        if (!response.ok) {
          const errMsg = data.error || `Server error (${response.status})`;
          addMessage(`😅 Oops! My brain no dey work right now. ${errMsg} No wahala, I go soon reset.`, 'bot');
          return;
        }

        const reply = data.reply || 'I no get response o, but I dey try!';
        addMessage(reply, 'bot');

      } catch (error) {
        hideTyping();
        addMessage(`😅 Oops! My brain no dey work right now. ${error.message || 'Try again later.'} No wahala, I go soon reset.`, 'bot');
      } finally {
        sendBtn.disabled = false;
        messageInput.disabled = false;
        messageInput.focus();
      }
    }

    // ============================================================
    // FILE ATTACHMENT HANDLER
    // ============================================================
    function handleFiles(files) {
      const allowedTypes = ['image/png', 'image/jpeg', 'image/gif', 'image/webp', 'application/pdf',
        'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
        'text/plain', 'application/vnd.ms-excel', 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
        'application/vnd.ms-powerpoint', 'application/vnd.openxmlformats-officedocument.presentationml.presentation'
      ];

      for (let file of files) {
        if (!allowedTypes.includes(file.type)) {
          showToast(`⚠️ File type not supported: ${file.type}`);
          continue;
        }
        if (file.size > MAX_FILE_SIZE) {
          showToast(`⚠️ File too large: ${file.name} (max 5MB)`);
          continue;
        }

        // Create attachment object
        const att = { file, name: file.name, size: file.size, type: file.type, dataURL: null };

        // If image, generate a thumbnail preview
        if (file.type.startsWith('image/')) {
          const reader = new FileReader();
          reader.onload = (e) => {
            att.dataURL = e.target.result;
            renderAttachmentPreview(); // re-render to show image
          };
          reader.readAsDataURL(file);
          // push immediately but will re-render when dataURL loads
          attachments.push(att);
          renderAttachmentPreview();
        } else {
          attachments.push(att);
          renderAttachmentPreview();
        }
      }

      // Clear input
      fileInput.value = '';
    }

    // ============================================================
    // EVENT LISTENERS
    // ============================================================
    attachBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFiles(e.target.files);
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    messageInput.addEventListener('input', () => {
      messageInput.style.height = 'auto';
      messageInput.style.height = messageInput.scrollHeight + 'px';
    });

    // ============================================================
    // AUTH
    // ============================================================
    function logout() {
      auth.signOut().then(() => {
        localStorage.removeItem('earnsphere_user_data');
        window.location.href = 'login.html';
      });
    }

    auth.onAuthStateChanged((user) => {
      if (user) {
        currentUser = user;
        document.getElementById('userName').textContent = user.displayName || user.email || 'User';
        // show initial message
        addMessage('👋 How you dey? I\'m SphereAI, your personal hustler assistant. Ask me anything about earning, tasks, or just talk! No wahala.', 'bot');
      } else {
        window.location.href = 'login.html';
      }
    });

    // ============================================================
    // DRAG & DROP SUPPORT (optional)
    // ============================================================
    const chatContainer = document.querySelector('.chat-container');
    chatContainer.addEventListener('dragover', (e) => {
      e.preventDefault();
      chatContainer.style.border = '2px dashed #3b82f6';
    });
    chatContainer.addEventListener('dragleave', (e) => {
      e.preventDefault();
      chatContainer.style.border = 'none';
    });
    chatContainer.addEventListener('drop', (e) => {
      e.preventDefault();
      chatContainer.style.border = 'none';
      if (e.dataTransfer.files.length > 0) {
        handleFiles(e.dataTransfer.files);
      }
    });
  </script>
</body>
</html>
