<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek AI Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #1e1e2e; color: #cdd6f4; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: #11111b; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #313244; }
        h1 { font-size: 1.25rem; color: #89b4fa; }
        .key-btn { background: #f38ba8; color: #11111b; border: none; padding: 5px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 0.95rem; word-break: break-word; }
        .user { background-color: #89b4fa; color: #11111b; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background-color: #313244; color: #cdd6f4; align-self: flex-start; border-bottom-left-radius: 2px; }
        .error-msg { background-color: #f38ba8; color: #11111b; align-self: center; border-radius: 8px; font-weight: bold; }
        #input-container { background-color: #11111b; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #313244; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #45475a; background-color: #181825; color: #cdd6f4; font-size: 1rem; outline: none; }
        input:focus { border-color: #89b4fa; }
        button { background-color: #89b4fa; color: #11111b; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        button:hover { background-color: #b4befe; }
        button:disabled { background-color: #585b70; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <h1>DeepSeek AI Assistant</h1>
        <button class="key-btn" onclick="clearKey()">Reset Key</button>
    </header>

    <div id="chat-container">
        <div class="message ai">Hello! I am your AI assistant. How can I help you today?</div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        let conversationHistory = [];

        // Retrieves key safely straight out of your private browser memory cache
        function getApiKey() {
            let key = localStorage.getItem('MY_DEEPSEEK_KEY');
            if (!key) {
                key = prompt("Please enter your DeepSeek API Key (It saves safely inside this device's browser memory only):");
                if (key) {
                    localStorage.setItem('MY_DEEPSEEK_KEY', key.trim());
                }
            }
            return key;
        }

        function clearKey() {
            localStorage.removeItem('MY_DEEPSEEK_KEY');
            alert("API Key cleared from local memory storage.");
            location.reload();
        }

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }

        async function sendMessage() {
            const promptText = userInput.value.trim();
            if (!promptText) return;

            const apiKey = getApiKey();
            if (!apiKey) {
                appendMessage("❌ Error: API key required to send messages.", "error-msg");
                return;
            }

            appendMessage(promptText, 'user');
            userInput.value = '';
            conversationHistory.push({ role: "user", content: promptText });

            userInput.disabled = true;
            sendBtn.disabled = true;
            const aiMessageBubble = appendMessage("Thinking...", 'ai');

            try {
                const response = await fetch(`https://deepseek.com`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: conversationHistory,
                        stream: false
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                const assistantReply = data.choices[0].message.content;

                aiMessageBubble.innerText = assistantReply;
                conversationHistory.push({ role: "assistant", content: assistantReply });

            } catch (err) {
                console.error(err);
                aiMessageBubble.innerText = `❌ Error: ${err.message}`;
                aiMessageBubble.classList.add('error-msg');
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
