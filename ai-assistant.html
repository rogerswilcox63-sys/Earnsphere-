<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek AI Assistant</title>
    
    <!-- ⚠️ CRITICAL STEP: Imports your config.js variables BEFORE the assistant logic runs -->
    <script src="config.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #1e1e2e; color: #cdd6f4; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: #11111b; padding: 15px; text-align: center; border-bottom: 1px solid #313244; }
        h1 { font-size: 1.25rem; color: #89b4fa; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 0.95rem; word-break: break-word; }
        .user { background-color: #89b4fa; color: #11111b; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background-color: #313244; color: #cdd6f4; align-self: flex-start; border-bottom-left-radius: 2px; }
        .error-msg { background-color: #f38ba8; color: #11111b; align-self: center; border-radius: 8px; font-weight: bold; }
        #input-container { background-color: #11111b; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #313244; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #45475a; background-color: #181825; color: #cdd6f4; font-size: 1rem; outline: none; }
        input:focus { border-color: #89b4fa; }
        button { background-color: #89b4fa; color: #11111b; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        button:hover { background-color: #b4befe; }
        button:disabled { background-color: #585b70; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <h1>DeepSeek AI Assistant</h1>
    </header>

    <div id="chat-container">
        <div class="message ai">Hello! I am your AI assistant running on DeepSeek. How can I help you today?</div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // Main chat history collector array
        let conversationHistory = [];

        // Appends visual bubble tags straight onto our DOM layout container
        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }

        async function sendMessage() {
            const promptText = userInput.value.trim();
            if (!promptText) return;

            // 🛠️ FAIL-SAFE ERROR EXTRACTION: Validates your window variables right before firing API calls
            if (!window.API_CONFIG || !window.API_CONFIG.apiKey) {
                appendMessage("❌ Configuration Error: 'window.API_CONFIG.apiKey' is missing. Please ensure your config.js file is loaded correctly and contains your key string.", "error-msg");
                return;
            }

            // Append user text visually and wipe the input line clean
            appendMessage(promptText, 'user');
            userInput.value = '';
            
            // Build the current conversation state payload
            conversationHistory.push({ role: "user", content: promptText });

            // Disable interactive inputs during transit wait states
            userInput.disabled = true;
            sendBtn.disabled = true;

            // Create a loading state bubble placeholder
            const aiMessageBubble = appendMessage("Thinking...", 'ai');

            try {
                // Strips tail slash paths to guarantee standard cleaner endpoint configurations
                const cleanBaseURL = window.API_CONFIG.baseURL.replace(/\/+$/, '');
                
                const response = await fetch(`${cleanBaseURL}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${window.API_CONFIG.apiKey}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat", // Uses default DeepSeek-V3 flagship conversational chat structure
                        messages: conversationHistory,
                        stream: false
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP Error ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                const assistantReply = data.choices[0].message.content;

                // Update placeholder bubble with text data payload string
                aiMessageBubble.innerText = assistantReply;
                
                // Track backend responses to preserve session history context state
                conversationHistory.push({ role: "assistant", content: assistantReply });

            } catch (err) {
                console.error(err);
                aiMessageBubble.innerText = `❌ Error: ${err.message}. Please double check your key configuration properties or console logs.`;
                aiMessageBubble.classList.add('error-msg');
            } finally {
                // Re-enable input interactions once operations finalize
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        // Bind interactive event hooks across layout nodes
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
