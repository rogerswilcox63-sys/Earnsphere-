<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch an Ad - EarnSphere</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5803688718527724"
     crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <style>
    body { font-family:'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height:100vh; color:#f1f5f9; padding:2rem; display:flex; align-items:center; justify-content:center; }
    .container { max-width:500px; background:rgba(30,41,59,.6); backdrop-filter:blur(12px); border-radius:1rem; padding:2rem; border:1px solid rgba(255,255,255,.1); text-align:center; }
    .back-link { color:#3b82f6; text-decoration:none; display:inline-block; margin-bottom:1rem; float:left; }
    .back-link:hover { text-decoration:underline; }
    h1 { margin-bottom:.5rem; }
    .reward-badge { background:rgba(16,185,129,.2); color:#10b981; padding:.25rem .75rem; border-radius:.25rem; font-size:.9rem; display:inline-block; margin:1rem 0; }
    .timer-text { font-size:2rem; font-weight:700; color:#f59e0b; margin:1.5rem 0; }
    .ad-placeholder { background:rgba(255,255,255,.05); border-radius:8px; padding:2rem; margin:1rem 0; border:2px dashed rgba(255,255,255,.1); }
    .btn-primary { background:linear-gradient(135deg, #3b82f6, #2563eb); border:none; color:#fff; padding:1rem; border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer; width:100%; margin-top:.5rem; transition:all 0.3s; }
    .btn-primary:hover:not(:disabled) { transform:scale(1.02); }
    .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-success { background:linear-gradient(135deg, #10b981, #059669); }
    .toast { background:rgba(30,41,59,.95); padding:1rem 1.5rem; border-radius:.5rem; border:1px solid rgba(16,185,129,.3); color:#fff; animation:slideIn 0.3s ease; box-shadow:0 4px 15px rgba(0,0,0,.3); position:fixed; top:20px; right:20px; z-index:9999; max-width:90%; }
    @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
  </style>
</head>
<body>
  <div class="container">
    <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>
    <h1><i class="fas fa-play"></i> Watch an Ad</h1>
    <p>Watch a short ad and earn <strong>₦50</strong>!</p>
    <div class="reward-badge"><i class="fas fa-coins"></i> Reward: ₦50 per day</div>

    <div class="ad-placeholder">
      <i class="fas fa-film" style="font-size:3rem; color:#64748b;"></i>
      <p style="margin-top:.5rem; color:#94a3b8;">Your ad will appear here</p>
    </div>

    <div id="timerDisplay" class="timer-text">⏳ 10 seconds</div>
    <ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-5803688718527724"
     data-ad-slot="YOUR_AD_SLOT_ID"
     data-ad-format="auto"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>
    <button class="btn-primary" id="startBtn" onclick="watchAd()"><i class="fas fa-play"></i> Start Watching</button>
    <button class="btn-primary btn-success" id="claimBtn" style="display:none;" onclick="claimReward()"><i class="fas fa-check"></i> Claim ₦50</button>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCVExwvLDwVmMJ6XbyTCrY1IyMqyhiuLbo",
      authDomain: "earnspherehub-742e9.firebaseapp.com",
      projectId: "earnspherehub-742e9",
      storageBucket: "earnspherehub-742e9.firebasestorage.app",
      messagingSenderId: "173538573377",
      appId: "1:173538573377:web:6d8c748376afcb9096dac0"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let userData = { balance:0, lifetimeTotal:0, successfulTaskCount:0, completedTasks:{} };
    let adTimer;
    let seconds = 10;

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = msg;
      document.body.appendChild(toast);
      setTimeout(() => { toast.remove(); }, 3500);
    }

    function getTodayDateString() {
      return new Date().toISOString().split('T')[0];
    }

    function isCompletedToday(taskId) {
      if (!userData.completedTasks || !userData.completedTasks[taskId]) return false;
      const completedDate = new Date(userData.completedTasks[taskId]).toISOString().split('T')[0];
      return completedDate === getTodayDateString();
    }

    async function loadUserData(uid) {
      const doc = await db.collection('users').doc(uid).get();
      if (doc.exists) {
        userData = doc.data();
        const taskId = 'extra_ad';
        if (isCompletedToday(taskId)) {
          document.getElementById('startBtn').disabled = true;
          document.getElementById('startBtn').innerHTML = '✅ Completed Today';
        }
      }
    }

    function watchAd() {
      const startBtn = document.getElementById('startBtn');
      const claimBtn = document.getElementById('claimBtn');
      const timerDisplay = document.getElementById('timerDisplay');

      startBtn.disabled = true;
      startBtn.innerHTML = '⏳ Watching...';
      seconds = 10;
      timerDisplay.textContent = `⏳ ${seconds} seconds`;

      adTimer = setInterval(() => {
        seconds--;
        timerDisplay.textContent = `⏳ ${seconds} seconds`;
        if (seconds <= 0) {
          clearInterval(adTimer);
          timerDisplay.textContent = '✅ Ad watched!';
          startBtn.style.display = 'none';
          claimBtn.style.display = 'block';
        }
      }, 1000);
    }

    async function claimReward() {
      const user = auth.currentUser;
      if (!user) {
        showToast('⚠️ Please log in.');
        return;
      }

      await loadUserData(user.uid);
      const taskId = 'extra_ad';
      if (isCompletedToday(taskId)) {
        showToast('⚠️ You already claimed your ad reward today!');
        return;
      }

      if (!userData.completedTasks) userData.completedTasks = {};
      userData.completedTasks[taskId] = Date.now();
      const reward = 50;
      userData.balance = (userData.balance || 0) + reward;
      userData.lifetimeTotal = (userData.lifetimeTotal || 0) + reward;
      userData.successfulTaskCount = (userData.successfulTaskCount || 0) + 1;

      await db.collection('users').doc(user.uid).set(userData, { merge: true });
      showToast(`🎉 Ad reward claimed! +₦${reward} earned!`);
      document.getElementById('claimBtn').disabled = true;
      document.getElementById('claimBtn').innerHTML = '✅ Claimed Today';
    }

    auth.onAuthStateChanged(async (user) => {
      if (user) await loadUserData(user.uid);
    });
  </script>
</body>
</html>
