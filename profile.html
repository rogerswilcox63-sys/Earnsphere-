<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>EarnSphere Nigeria - Profile</title>
  
  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5803688718527724" crossorigin="anonymous"></script>
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 50%, rgba(59,130,246,.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(16,185,129,.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    #app { position: relative; z-index: 1; flex: 1; }

    /* ----- NAVBAR ----- */
    .navbar {
      background: rgba(30,41,59,.7);
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 12px rgba(0,0,0,.3);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .nav-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .nav-links a {
      text-decoration: none;
      color: #cbd5e1;
      font-weight: 500;
      padding: .5rem 1rem;
      border-radius: .5rem;
      transition: all 0.3s;
    }
    .nav-links a:hover,
    .nav-links a.active {
      color: #3b82f6;
      background: rgba(59,130,246,.15);
    }
    .logo {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .user-greeting {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .user-greeting span {
      font-weight: 600;
      color: #f1f5f9;
    }
    .logout-btn {
      background: rgba(59,130,246,.2);
      border: 1px solid rgba(59,130,246,.3);
      padding: .5rem 1rem;
      border-radius: 2rem;
      font-weight: 500;
      color: #3b82f6;
      cursor: pointer;
      transition: 0.2s;
    }
    .logout-btn:hover {
      background: rgba(59,130,246,.3);
      border-color: #3b82f6;
    }

    /* ----- PROFILE ----- */
    .profile-container {
      max-width: 600px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      width: 100%;
    }
    .section-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin: 2rem 0 1.5rem;
      display: flex;
      align-items: center;
      gap: .6rem;
    }
    .profile-card {
      background: rgba(30,41,59,.6);
      backdrop-filter: blur(12px);
      border-radius: 1rem;
      padding: 2rem;
      border: 1px solid rgba(255,255,255,.1);
    }
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 800;
      margin: 0 auto 1.5rem;
      color: #fff;
    }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label {
      display: block;
      margin-bottom: .6rem;
      color: #cbd5e1;
      font-weight: 500;
      font-size: .9rem;
    }
    .form-control {
      width: 100%;
      padding: .9rem 1.1rem;
      background: rgba(15,23,42,.6);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: .75rem;
      color: #f1f5f9;
      font-size: 1rem;
      transition: border .3s;
    }
    .form-control:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.2);
    }
    .form-control:disabled {
      opacity: .6;
      cursor: not-allowed;
    }
    .save-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      border: none;
      border-radius: .75rem;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: .3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }
    .save-btn:hover:not(:disabled) { transform: translateY(-2px); }
    .save-btn:disabled {
      background: #4b5563;
      cursor: not-allowed;
      transform: none;
    }
    .message {
      padding: .8rem 1rem;
      border-radius: .75rem;
      margin-bottom: 1.5rem;
      font-size: .9rem;
      text-align: center;
      font-weight: 500;
    }
    .message.success {
      background: rgba(16,185,129,.2);
      border: 1px solid rgba(16,185,129,.3);
      color: #6ee7b7;
    }
    .message.error {
      background: rgba(239,68,68,.2);
      border: 1px solid rgba(239,68,68,.3);
      color: #fca5a5;
    }
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-box {
      background: rgba(15,23,42,.6);
      padding: 1rem;
      border-radius: .75rem;
      text-align: center;
    }
    .stat-box-title {
      font-size: .8rem;
      color: #94a3b8;
      margin-bottom: .3rem;
    }
    .stat-box-value {
      font-size: 1.3rem;
      font-weight: 700;
      color: #10b981;
    }

    /* ----- FOOTER ----- */
    .footer {
      background: rgba(15,23,42,.8);
      padding: 2rem;
      margin-top: auto;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,.1);
      font-size: .9rem;
      color: #64748b;
    }
    .footer a {
      color: #64748b;
      text-decoration: none;
      margin: 0 .5rem;
    }
    .footer a:hover { color: #3b82f6; }

    /* ----- TOAST ----- */
    #toastContainer {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }
    .toast {
      background: rgba(30,41,59,.95);
      padding: .8rem 1.5rem;
      border-radius: .5rem;
      margin-bottom: .5rem;
      border: 1px solid rgba(16,185,129,.3);
      color: #fff;
      animation: slideIn .3s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ----- RESPONSIVE ----- */
    @media (max-width: 700px) {
      .navbar { flex-direction: column; text-align: center; padding: 1rem; }
      .nav-links { justify-content: center; }
      .stats-row { grid-template-columns: 1fr; }
      .profile-container { padding: 0 1rem; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- NAVBAR -->
    <div class="navbar">
      <div class="logo"><i class="fas fa-coins"></i> EarnSphere</div>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="withdraw.html">Withdraw</a>
        <a href="profile.html" class="active">Profile</a>
        <a href="ai-assistant.html"><i class="fas fa-robot"></i> AI Assistant</a>
      </div>
      <div class="user-greeting">
        <span id="userName">Welcome, User</span>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>

    <!-- PROFILE CONTENT -->
    <div class="profile-container">
      <h2 class="section-title"><i class="fas fa-user"></i> My Profile</h2>

      <div class="profile-card">
        <div class="avatar" id="userAvatar">U</div>

        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-box-title">Wallet Balance</div>
            <div class="stat-box-value" id="profileBalance">₦0.00</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-title">Tasks Done</div>
            <div class="stat-box-value" id="profileTasks">0</div>
          </div>
        </div>

        <div id="profileMessage"></div>

        <form id="profileForm">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="profileName" class="form-control" required />
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="profileEmail" class="form-control" required />
          </div>

          <div class="form-group">
            <label>Member Since</label>
            <input type="text" id="memberSince" class="form-control" disabled />
          </div>

          <button type="submit" class="save-btn" id="saveBtn">
            <i class="fas fa-save"></i> Save Changes
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <p>
      <a href="privacy-policy.html">Privacy Policy</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="https://wa.me/2347012814071" target="_blank" style="color:#25D366;">
        <i class="fab fa-whatsapp"></i> WhatsApp
      </a>
    </p>
    <p style="margin-top: 1rem; font-size: .75rem;">© 2026 EarnSphere Hub. All rights reserved.</p>
  </footer>

  <!-- TOAST CONTAINER -->
  <div id="toastContainer"></div>

  <!-- ============================================================
  FIREBASE CONFIG
  ============================================================ -->
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCVExwvLDwVmMJ6XbyTCrY1IyMqyhiuLbo",
      authDomain: "earnspherehub-742e9.firebaseapp.com",
      projectId: "earnspherehub-742e9",
      storageBucket: "earnspherehub-742e9.firebasestorage.app",
      messagingSenderId: "173538573377",
      appId: "1:173538573377:web:6d8c748376afcb9096dac0"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    // ============================================================
    // DOM REFS
    // ============================================================
    const userNameEl = document.getElementById('userName');
    const userAvatarEl = document.getElementById('userAvatar');
    const profileName = document.getElementById('profileName');
    const profileEmail = document.getElementById('profileEmail');
    const profileBalance = document.getElementById('profileBalance');
    const profileTasks = document.getElementById('profileTasks');
    const memberSince = document.getElementById('memberSince');
    const profileMessage = document.getElementById('profileMessage');
    const saveBtn = document.getElementById('saveBtn');
    const profileForm = document.getElementById('profileForm');

    let currentUserData = null;
    let unsubscribeUser = null;

    // ============================================================
    // FORMAT HELPERS
    // ============================================================
    function formatNaira(value) {
      return `₦${(value || 0).toLocaleString('en-US', { minimumFractionDigits: 2 })}`;
    }

    function showToast(msg) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = msg;
      container.appendChild(toast);
      setTimeout(() => { toast.remove(); }, 3500);
    }

    function showMessage(msg, type = 'success') {
      profileMessage.innerHTML = `<div class="message ${type}">${msg}</div>`;
      setTimeout(() => { profileMessage.innerHTML = ''; }, 5000);
    }

    // ============================================================
    // LOAD PROFILE FROM FIRESTORE (REAL-TIME)
    // ============================================================
    function loadProfile(user) {
      if (unsubscribeUser) {
        unsubscribeUser();
        unsubscribeUser = null;
      }

      const userRef = db.collection('users').doc(user.uid);

      // Real-time listener
      unsubscribeUser = userRef.onSnapshot((doc) => {
        if (doc.exists) {
          const data = doc.data();
          currentUserData = data;

          // Update UI
          const name = data.displayName || data.name || user.displayName || 'User';
          const email = data.email || user.email || '';
          const balance = data.balance || 0;
          const tasks = data.successfulTaskCount || 0;

          userNameEl.textContent = `Welcome, ${name}`;
          userAvatarEl.textContent = name.charAt(0).toUpperCase();
          profileName.value = name;
          profileEmail.value = email;
          profileBalance.textContent = formatNaira(balance);
          profileTasks.textContent = tasks;

          // Member since
          const joined = data.createdAt || data.joinedDate || data._joinedAt;
          if (joined) {
            const d = joined.toDate ? joined.toDate() : new Date(joined);
            memberSince.value = d.toLocaleDateString('en-NG', { year: 'numeric', month: 'long', day: 'numeric' });
          } else {
            memberSince.value = 'Active Member';
          }

          // Cache to localStorage for offline fallback
          localStorage.setItem('earnsphere_user_data', JSON.stringify(data));
        } else {
          // User doc doesn't exist – create one
          userRef.set({
            displayName: user.displayName || 'User',
            email: user.email || '',
            balance: 0,
            lifetimeTotal: 0,
            successfulTaskCount: 0,
            completedTasks: {},
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
        }
      }, (error) => {
        console.error('Profile listener error:', error);
        showToast('⚠️ Could not load profile data. Check your connection.');
      });
    }

    // ============================================================
    // AUTH STATE
    // ============================================================
    auth.onAuthStateChanged((user) => {
      if (user) {
        // Load from Firestore
        loadProfile(user);
      } else {
        // Not logged in – redirect to login
        window.location.href = 'login.html';
      }
    });

    // ============================================================
    // SAVE PROFILE
    // ============================================================
    profileForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const newName = profileName.value.trim();
      const newEmail = profileEmail.value.trim();

      if (!newName || !newEmail) {
        showMessage('Please fill in all fields.', 'error');
        return;
      }

      const user = auth.currentUser;
      if (!user) {
        showMessage('You must be logged in to update your profile.', 'error');
        return;
      }

      saveBtn.disabled = true;
      saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

      try {
        // Update Firebase Auth displayName
        if (newName !== user.displayName) {
          await user.updateProfile({ displayName: newName });
        }

        // Update Firebase Auth email (requires recent login)
        if (newEmail !== user.email) {
          try {
            await user.updateEmail(newEmail);
          } catch (emailErr) {
            if (emailErr.code === 'auth/requires-recent-login') {
              showMessage('⚠️ Please log out and log back in to change your email address.', 'error');
              saveBtn.disabled = false;
              saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
              return;
            }
            throw emailErr;
          }
        }

        // Update Firestore
        await db.collection('users').doc(user.uid).update({
          displayName: newName,
          name: newName,
          email: newEmail,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        showMessage('✅ Profile updated successfully!', 'success');
        showToast('✅ Profile saved!');

      } catch (err) {
        console.error('Save error:', err);
        showMessage(`❌ Error: ${err.message || 'Could not update profile'}`, 'error');
      } finally {
        saveBtn.disabled = false;
        saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
      }
    });

    // ============================================================
    // LOGOUT
    // ============================================================
    async function logout() {
      try {
        if (unsubscribeUser) {
          unsubscribeUser();
          unsubscribeUser = null;
        }
        await auth.signOut();
      } catch (err) {
        console.warn('Logout error:', err);
      }
      localStorage.removeItem('earnsphere_user_data');
      window.location.href = 'login.html';
    }

    // ============================================================
    // CLEANUP
    // ============================================================
    window.addEventListener('beforeunload', () => {
      if (unsubscribeUser) {
        unsubscribeUser();
      }
    });
  </script>
</body>
</html>
