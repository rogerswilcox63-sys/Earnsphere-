<<script>
    const saveBtn = document.getElementById('saveBtn');
    const profileMessage = document.getElementById('profileMessage');
    const userNameElement = document.getElementById('userName');
    const userAvatarElement = document.getElementById('userAvatar');
    const profileBalanceElement = document.getElementById('profileBalance');
    const profileTasksElement = document.getElementById('profileTasks');
    const memberSinceInput = document.getElementById('memberSince');

    let localUserData = JSON.parse(localStorage.getItem('currentUser'));

    // 1. STATE DISPATCHER: SYNC CURRENT PROFILE WITH LIVE FIREBASE REALTIME STREAMS
    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            // Local fallback validation track for offline workspace layouts
            if (localUserData) {
                userNameElement.innerText = `Welcome, ${localUserData.name}`;
                document.getElementById('profileName').value = localUserData.name;
                document.getElementById('profileEmail').value = localUserData.email;
                userAvatarElement.innerText = localUserData.name.charAt(0).toUpperCase();
                
                const localBal = parseFloat(localStorage.getItem('walletBalance')) || 0;
                const localTasks = parseInt(localStorage.getItem('successfulTaskCount')) || 0;
                profileBalanceElement.innerText = `₦${localBal.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
                profileTasksElement.innerText = localTasks;
                memberSinceInput.value = localStorage.getItem('joinDate') || new Date().toLocaleDateString();
            } else {
                window.location.href = 'login.html';
            }
        } else {
            // Live Firebase session found: Read user profile data from Firestore document
            try {
                const userRef = db.collection('users').doc(user.uid);
                
                userRef.onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        // Populate page inputs with fresh server configurations
                        userNameElement.innerText = `Welcome, ${data.name}`;
                        document.getElementById('profileName').value = data.name;
                        document.getElementById('profileEmail').value = data.email;
                        userAvatarElement.innerText = data.name.charAt(0).toUpperCase();
                        
                        const balanceValue = parseFloat(data.balance) || 0;
                        const taskValue = parseInt(data.successfulTaskCount) || 0;
                        
                        profileBalanceElement.innerText = `₦${balanceValue.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
                        profileTasksElement.innerText = taskValue;
                        
                        // Parse or handle formatting on registration timestamps
                        if (data.joinedDate) {
                            const dateParsed = new Date(data.joinedDate);
                            memberSinceInput.value = dateParsed.toLocaleDateString();
                        } else {
                            memberSinceInput.value = "Active Member";
                        }

                        // Sync downward to local storage layers to keep dashboards aligned
                        localStorage.setItem('currentUser', JSON.stringify(data));
                        localStorage.setItem('walletBalance', balanceValue);
                        localStorage.setItem('successfulTaskCount', taskValue);
                    }
                });
            } catch (err) {
                console.error("Firestore Profile Sync Failure: ", err);
            }
        }
    });

    // 2. PROCESS ENCRYPTED CREDENTIAL UPDATES VIA USER PROFILE INTERFACE
    document.getElementById('profileForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const newName = document.getElementById('profileName').value.trim();
        const newEmail = document.getElementById('profileEmail').value.trim();
        
        if (!newName || !newEmail) {
            profileMessage.innerHTML = '<div class="message error">Name and email fields are required!</div>';
            return;
        }

        saveBtn.disabled = true;
        saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving Changes...';
        profileMessage.innerHTML = '';

        const firebaseUser = auth.currentUser;

        if (firebaseUser) {
            try {
                // A. Update authentication email address credential tracking matrix
                if (newEmail !== firebaseUser.email) {
                    await firebaseUser.updateEmail(newEmail);
                }

                // B. Update authentication display layout name context string
                await firebaseUser.updateProfile({ displayName: newName });

                // C. Synchronize changes to user profile record entry document in Firestore
                await db.collection('users').doc(firebaseUser.uid).update({
                    name: newName,
                    email: newEmail
                });

                profileMessage.innerHTML = '<div class="message success"><i class="fas fa-check-circle"></i> Profile updated successfully in Firebase!</div>';

            } catch (err) {
                console.error("Firebase Profile Modification Error: ", err);
                if (err.code === 'auth/requires-recent-login') {
                    profileMessage.innerHTML = '<div class="message error"><i class="fas fa-shield-alt"></i> Security notice: Please log out and log back in to modify your core email registry.</div>';
                } else {
                    profileMessage.innerHTML = `<div class="message error"><i class="fas fa-times-circle"></i> Update failed: ${err.message}</div>`;
                }
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
            }
        } else {
            // Local workspace fallback routine layer for offline phone interface testing environments
            if (localUserData) {
                localUserData.name = newName;
                localUserData.email = newEmail;
                localStorage.setItem('currentUser', JSON.stringify(localUserData));
            }
            
            userNameElement.innerText = `Welcome, ${newName}`;
            userAvatarElement.innerText = newName.charAt(0).toUpperCase();
            
            profileMessage.innerHTML = '<div class="message success"><i class="fas fa-check-circle"></i> Local environment parameters synchronized successfully.</div>';
            
            setTimeout(() => {
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
                profileMessage.innerHTML = '';
            }, 2000);
        }
    });

    // 3. SECURE PROFILE SESSION TERMINATION REVENUE GATEWAY CLEANER
    async function logout() {
        try {
            await auth.signOut();
        } catch (err) {
            console.log("Offline bypass route triggered for layout exit simulation.");
        }
        localStorage.removeItem('currentUser');
        localStorage.removeItem('walletBalance');
        localStorage.removeItem('successfulTaskCount');
        window.location.href = 'login.html';
    }
</script>
