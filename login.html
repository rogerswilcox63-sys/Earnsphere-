        label { display: block; margin-bottom: 0.5rem; color: #cbd5e1; font-weight: 500; font-size: 0.9rem; }
        input { width: 100%; padding: 0.8rem 1rem; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; color: #f1f5f9; font-size: 1rem; }

       .toggle-form a { color: #3b82f6; text-decoration: none; font-weight: 600; }

       .message.error { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }
       .message.success { background: rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.3); color: #6ee7b7; }

<body>
    <div class="login-container">
        <div class="logo"><i class="fas fa-coins"></i> EarnSphere</div>
        <p class="subtitle">Welcome back</p>
        <div id="messageBox"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" name="password" placeholder="••••••••" required>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Remember me</label>
            </div>
            <button type="submit" class="btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
        </form>
        <div class="toggle-form">Don't have an account? <a href="register.html">Sign Up</a></div>
    </div>
    <footer class="footer">
        <p><a href="privacy-policy.html" style="color: #3b82f6;">Privacy Policy</a> | <a href="about.html" style="color: #3b82f6;">About</a> | <a href="contact.html" style="color: #3b82f6;">Contact</a></p>
        <p style="margin-top: 1rem; font-size: 0.75rem;">© 2026 EarnSphere. All rights reserved.</p>
    </footer>

<script>
    const messageBox = document.getElementById('messageBox');
    const loginBtn = document.getElementById('loginBtn');
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('loginEmail');
    const rememberMe = document.getElementById('rememberMe');

    // 1. Auto-redirect if already logged in
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (currentUser) {
        window.location.href = 'dashboard.html';
    }

    // 2. Load remembered email if it exists
    const rememberedEmail = localStorage.getItem('rememberedEmail');
    if (rememberedEmail) {
        emailInput.value = rememberedEmail;
        rememberMe.checked = true;
    }

    // 3. Handle login
    loginForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const email = document.getElementById('loginEmail').value.trim().toLowerCase();
        const password = document.getElementById('loginPassword').value;

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

        // Simulate small delay so spinner shows
        setTimeout(() => {
            // Check localStorage for users array
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                // Save current user session
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                // Handle "Remember me"
                if (rememberMe.checked) {
                    localStorage.setItem('rememberedEmail', email);
                } else {
                    localStorage.removeItem('rememberedEmail');
                }

                messageBox.className = "message success";
                messageBox.innerText = "Login successful! Redirecting...";
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                messageBox.className = "message error";
                messageBox.innerText = "Invalid email or password";
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        }, 500);
    });
</script>
</body>
