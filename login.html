    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EarnSphereHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #3b82f6; --primary-dark: #2563eb; --secondary: #10b981; --danger: #ef4444; --dark: #0f172a; --dark-light: #1e293b; --gray: #64748b; --gray-light: #cbd5e1; --light: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: linear-gradient(135deg, var(--dark), var(--dark-light)); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: var(--light); }
        .container { width: 100%; max-width: 450px; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border-radius: 16px; padding: 40px 30px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 28px; font-weight: 700; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .logo p { color: var(--gray-light); font-size: 14px; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: var(--gray-light); }
        .input-group input { width: 100%; padding: 14px 16px 14px 45px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: var(--light); font-size: 15px; transition: all 0.3s ease; }
        .input-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        .input-group i { position: absolute; left: 16px; top: 40px; color: var(--gray); font-size: 18px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .login-link { text-align: center; margin-top: 20px; font-size: 14px; color: var(--gray-light); }
        .login-link a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .login-link a:hover { color: var(--primary-dark); }
        .message { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; font-weight: 500; display: none; }
        .message.error { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); display: block; }
        .message.success { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.3); display: block; }
        .forgot-pass { text-align: right; margin-top: -10px; margin-bottom: 20px; }
        .forgot-pass a { color: var(--gray-light); font-size: 13px; text-decoration: none; }
        .forgot-pass a:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>EarnSphereHub</h1>
            <p>Welcome back</p>
        </div>

        <div id="messageBox" class="message"></div>

        <div id="loginForm">
            <div class="input-group">
                <label for="email">Email Address</label>
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <div class="forgot-pass">
                <a href="reset-password.html">Forgot password?</a>
            </div>
            <button class="btn btn-primary" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </div>

        <div class="login-link">
            Don't have an account? <a href="register.html">Register</a>
        </div>
    </div>

    <script>
    const loginBtn = document.getElementById('loginBtn');
    const messageBox = document.getElementById('messageBox');

    function showMessage(text, type) {
        messageBox.textContent = text;
        messageBox.className = `message ${type}`;
        messageBox.style.display = 'block';
        if (type === 'success') {
            setTimeout(() => messageBox.style.display = 'none', 3000);
        }
    }

    // Auto-redirect if already logged in AND verified
    auth.onAuthStateChanged(user => {
        if (user && user.emailVerified) {
            window.location.href = 'dashboard.html';
        }
    });

    loginBtn.addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        messageBox.style.display = 'none';
        if (!email || !password) {
            showMessage('Please fill all fields', 'error');
            return;
        }

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

        try {
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const user = userCredential.user;

            console.log('Email verified status:', user.emailVerified); // For debugging

            // THIS IS THE KEY CHECK
            if (!user.emailVerified) {
                showMessage('Your email is not verified. Check your inbox and spam folder.', 'error');
                await auth.signOut(); // Log them out immediately
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                return;
            }

            // Only runs if email IS verified
            await db.collection('users').doc(user.uid).update({
                emailVerified: true,
                lastLogin: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(() => {}); // Ignore if doc doesn't exist

            showMessage('Login successful! Redirecting...', 'success');
            setTimeout(() => window.location.href = 'dashboard.html', 1000);

        } catch (error) {
            let msg = error.message;
            if (error.code === 'auth/user-not-found') msg = 'No account found with this email.';
            if (error.code === 'auth/wrong-password') msg = 'Incorrect password.';
            if (error.code === 'auth/invalid-email') msg = 'Invalid email address.';
            if (error.code === 'auth/too-many-requests') msg = 'Too many attempts. Try again later.';
            showMessage(msg, 'error');
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
        }
    });

    // Allow Enter key to submit
    document.getElementById('password').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') loginBtn.click();
    });
</script>
</body>
