<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - EarnSphereHub</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1a73e8);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .auth-box {
      background: white;
      padding: 2.5rem 2rem;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .auth-box .logo {
      font-size: 2rem;
      font-weight: 800;
      color: #1a73e8;
      margin-bottom: 0.25rem;
    }

    .auth-box .sub {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    .auth-box h2 {
      color: #1a73e8;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .input-group {
      margin: 0.8rem 0;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }

    .input-group input {
      width: 100%;
      padding: 0.85rem;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 1rem;
      transition: border-color 0.2s;
      background: #f9fafb;
    }

    .input-group input:focus {
      outline: none;
      border-color: #1a73e8;
      background: white;
    }

    .btn-primary {
      width: 100%;
      padding: 0.95rem;
      border: none;
      border-radius: 12px;
      background: #1a73e8;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.5rem;
    }

    .btn-primary:hover {
      background: #1558b0;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
    }

    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: #999;
      font-size: 0.85rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .btn-google {
      width: 100%;
      padding: 0.85rem;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      background: white;
      color: #333;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-google:hover {
      background: #f8f9fa;
      border-color: #1a73e8;
    }

    .switch-link {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #555;
    }

    .switch-link a {
      color: #1a73e8;
      text-decoration: none;
      font-weight: 700;
    }

    .switch-link a:hover {
      text-decoration: underline;
    }

    .error-msg {
      color: #ef4444;
      font-size: 0.85rem;
      margin: 0.5rem 0;
      min-height: 20px;
    }

    .success-msg {
      color: #10b981;
      font-size: 0.85rem;
      margin: 0.5rem 0;
    }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: 0.8rem;
      color: #1a73e8;
      text-decoration: none;
      margin-top: 0.25rem;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="auth-box">
    <div class="logo">💰 EarnSphereHub</div>
    <div class="sub">Welcome back</div>

    <h2>Sign In</h2>

    <!-- Login Form -->
    <div id="login-form">
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password" />
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
      <div id="loginError" class="error-msg"></div>
      <button class="btn-primary" id="loginBtn">Sign In</button>

      <div class="divider">or continue with</div>

      <button class="btn-google" id="googleLoginBtn">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
          <path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
          <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
          <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
        </svg>
        Sign in with Google
      </button>

      <div class="switch-link">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signInWithPopup,
      GoogleAuthProvider,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ─── Firebase Config ──────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyCVExwvLDwVmMJ6XbyTCrY1IyMqyhiuLbo",
      authDomain: "earnspherehub-742e9.firebaseapp.com",
      projectId: "earnspherehub-742e9",
      storageBucket: "earnspherehub-742e9.firebasestorage.app",
      messagingSenderId: "173538573377",
      appId: "1:173538573377:web:6d8c748376afcb9096dac0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // ─── DOM Elements ──────────────────────────────────────────────────────
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');

    // ─── Handle Login ──────────────────────────────────────────────────
    async function handleLogin(email, password) {
      const btn = loginBtn;
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      loginError.textContent = '';
      loginError.style.color = '#ef4444';

      try {
        await signInWithEmailAndPassword(auth, email, password);
        loginError.style.color = '#10b981';
        loginError.textContent = '✅ Signed in! Redirecting...';
        btn.textContent = '✅ Welcome!';

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1000);

      } catch (error) {
        console.error(error);
        loginError.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    // ─── Google Login ──────────────────────────────────────────────────
    async function handleGoogleLogin() {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        // Check if user exists in Firestore
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (userDoc.exists()) {
          window.location.href = 'dashboard.html';
        } else {
          // User exists in auth but not in Firestore - redirect to register
          alert('Account not fully set up. Please register first.');
          window.location.href = 'register.html';
        }

      } catch (error) {
        console.error('Google login error:', error);
        loginError.textContent = 'Google sign-in failed: ' + error.message;
      }
    }

    // ─── Event Listeners ──────────────────────────────────────────────

    // Login button
    loginBtn.addEventListener('click', () => {
      const email = loginEmail.value.trim();
      const password = loginPassword.value;

      if (!email || !password) {
        loginError.textContent = '⚠️ Please fill in all fields';
        return;
      }

      handleLogin(email, password);
    });

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        loginBtn.click();
      }
    });

    // Google button
    document.getElementById('googleLoginBtn').addEventListener('click', handleGoogleLogin);

    // ─── Auto-redirect if already logged in ──────────────────────────
    onAuthStateChanged(auth, (user) => {
      if (user) {
        getDoc(doc(db, 'users', user.uid)).then(snap => {
          if (snap.exists()) {
            window.location.href = 'dashboard.html';
          }
        }).catch(() => {});
      }
    });

    console.log('%c✅ Login Page', 'color:#10b981');
  </script>
</body>
</html>
