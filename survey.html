<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surveys - EarnSphere</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <style>
    body { font-family:'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height:100vh; color:#f1f5f9; padding:2rem; }
    .container { max-width:900px; margin:0 auto; }
    .back-link { color:#3b82f6; text-decoration:none; display:inline-block; margin-bottom:1.5rem; }
    .back-link:hover { text-decoration:underline; }
    h1 { margin-bottom:1.5rem; }
    .survey-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:1.5rem; }
    .survey-card { background:rgba(30,41,59,.6); backdrop-filter:blur(12px); border-radius:1rem; padding:1.5rem; border:1px solid rgba(255,255,255,.1); }
    .survey-card h3 { margin-bottom:.5rem; }
    .survey-card .desc { font-size:.9rem; color:#cbd5e1; margin-bottom:.5rem; }
    .survey-card .badge { display:inline-block; padding:.25rem .75rem; border-radius:.25rem; font-size:.8rem; background:rgba(59,130,246,.2); color:#3b82f6; margin:.5rem 0; }
    .survey-card .reward { color:#10b981; font-weight:700; font-size:1.1rem; margin:.5rem 0; }
    .start-btn { width:100%; background:linear-gradient(135deg, #3b82f6, #2563eb); color:#fff; border:none; padding:.8rem; border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.3s; }
    .start-btn:hover:not(:disabled) { transform:scale(1.02); box-shadow:0 4px 15px rgba(59,130,246,.3); }
    .start-btn:disabled { background:#334155; cursor:not-allowed; opacity:0.7; }
    .toast { background:rgba(30,41,59,.95); padding:1rem 1.5rem; border-radius:.5rem; border:1px solid rgba(16,185,129,.3); color:#fff; animation:slideIn 0.3s ease; box-shadow:0 4px 15px rgba(0,0,0,.3); position:fixed; top:20px; right:20px; z-index:9999; max-width:90%; }
    @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
  </style>
</head>
<body>
  <div class="container">
    <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    <h1><i class="fas fa-poll"></i> Surveys (10 per day)</h1>
    <p>Complete surveys and earn rewards! Each survey resets daily at midnight.</p>

    <div class="survey-grid" id="surveyGrid"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCVExwvLDwVmMJ6XbyTCrY1IyMqyhiuLbo",
      authDomain: "earnspherehub-742e9.firebaseapp.com",
      projectId: "earnspherehub-742e9",
      storageBucket: "earnspherehub-742e9.firebasestorage.app",
      messagingSenderId: "173538573377",
      appId: "1:173538573377:web:6d8c748376afcb9096dac0"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let userData = { balance:0, lifetimeTotal:0, successfulTaskCount:0, completedTasks:{} };

    const surveys = [
      { id: 'srv_01', title: 'Social Media Usage', category: 'Tech', reward: 150, desc: 'Tell us about your screen time habits' },
      { id: 'srv_02', title: 'Crypto Knowledge Check', category: 'Finance', reward: 250, desc: 'Your insights on digital assets' },
      { id: 'srv_03', title: 'Nollywood Movie Preferences', category: 'Entertainment', reward: 200, desc: 'Tell us your favourite Nollywood actors and movies.' },
      { id: 'srv_04', title: 'Nigerian Food Culture', category: 'Lifestyle', reward: 180, desc: 'What are your favourite Nigerian dishes and recipes?' },
      { id: 'srv_05', title: 'Music Streaming Habits', category: 'Entertainment', reward: 220, desc: 'How do you listen to music? Share your streaming habits.' },
      { id: 'srv_06', title: 'Online Shopping Behavior', category: 'E-commerce', reward: 250, desc: 'Share your experience with online shopping in Nigeria.' },
      { id: 'srv_07', title: 'Football & Sports Passion', category: 'Sports', reward: 200, desc: 'Tell us about your favourite teams and how you follow sports.' },
      { id: 'srv_08', title: 'Education & Career Goals', category: 'Education', reward: 300, desc: 'Share your educational background and career aspirations.' },
      { id: 'srv_09', title: 'Travel & Tourism Preferences', category: 'Lifestyle', reward: 180, desc: 'Where do you want to travel? Share your dream destinations.' },
      { id: 'srv_10', title: 'Smartphone Usage Patterns', category: 'Tech', reward: 250, desc: 'How do you use your smartphone daily? Share your habits.' }
    ];

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = msg;
      document.body.appendChild(toast);
      setTimeout(() => { toast.remove(); }, 3500);
    }

    function getTodayDateString() {
      return new Date().toISOString().split('T')[0];
    }

    function isCompletedToday(taskId) {
      if (!userData.completedTasks || !userData.completedTasks[taskId]) return false;
      const completedDate = new Date(userData.completedTasks[taskId]).toISOString().split('T')[0];
      return completedDate === getTodayDateString();
    }

    async function loadUserData(uid) {
      const doc = await db.collection('users').doc(uid).get();
      if (doc.exists) {
        userData = doc.data();
      }
    }

    async function completeSurvey(taskId, reward) {
      const user = auth.currentUser;
      if (!user) {
        showToast('⚠️ Please log in.');
        return;
      }
      await loadUserData(user.uid);
      if (isCompletedToday(taskId)) {
        showToast('⚠️ You already completed this survey today!');
        return;
      }

      if (!userData.completedTasks) userData.completedTasks = {};
      userData.completedTasks[taskId] = Date.now();
      userData.balance = (userData.balance || 0) + reward;
      userData.lifetimeTotal = (userData.lifetimeTotal || 0) + reward;
      userData.successfulTaskCount = (userData.successfulTaskCount || 0) + 1;

      await db.collection('users').doc(user.uid).set(userData, { merge: true });
      showToast(`🎉 Survey completed! +₦${reward} earned!`);
      renderSurveys();
    }

    function renderSurveys() {
      const grid = document.getElementById('surveyGrid');
      grid.innerHTML = '';
      surveys.forEach(s => {
        const completed = isCompletedToday(s.id);
        grid.innerHTML += `
          <div class="survey-card">
            <h3>${s.title}</h3>
            <p class="desc">${s.desc}</p>
            <span class="badge">${s.category}</span>
            <div class="reward">₦${s.reward}</div>
            <button class="start-btn" onclick="completeSurvey('${s.id}', ${s.reward})" ${completed ? 'disabled' : ''}>
              ${completed ? '✅ Completed' : '📝 Start Survey'}
            </button>
          </div>
        `;
      });
    }

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        await loadUserData(user.uid);
        renderSurveys();
      }
    });
  </script>
</body>
</html>
