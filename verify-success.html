<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verified - EarnSphereHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .success .icon { background: #10b981; color: white; }
        .error .icon { background: #ef4444; color: white; }
        .loading .icon { 
            background: #3b82f6; 
            color: white;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        h1 { 
            font-size: 24px; 
            margin-bottom: 12px; 
            color: #1f2937;
        }
        p { 
            color: #6b7280; 
            margin-bottom: 24px; 
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn:hover { 
            background: #5568d3; 
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container" id="statusContainer">
        <div class="loading">
            <div class="icon">⟳</div>
            <h1>Verifying your email...</h1>
            <p>Please wait while we confirm your email address.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import { getAuth, applyActionCode } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

        // Use your same config from dashboard.html
        const firebaseConfig = {
            apiKey: "AIzaSyAwvC2onHspiQkHtelEP7PzZg3v6dQ5FhI",
            authDomain: "earnspherehub-742e9.firebaseapp.com",
            projectId: "earnspherehub-742e9",
            storageBucket: "earnspherehub-742e9.firebasestorage.app",
            messagingSenderId: "1014748926489",
            appId: "1:1014748926489:web:0feef2d1f5f9eafb8e4c8e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const oobCode = urlParams.get('oobCode');
        const mode = urlParams.get('mode');
        const container = document.getElementById('statusContainer');

        if (mode === 'verifyEmail' && oobCode) {
            applyActionCode(auth, oobCode)
                .then(() => {
                    container.innerHTML = `
                        <div class="success">
                            <div class="icon">✓</div>
                            <h1>Email Verified!</h1>
                            <p>Your email has been successfully verified. You can now access your EarnSphereHub dashboard.</p>
                            <a href="login.html" class="btn">Continue to Login</a>
                        </div>
                    `;
                })
                .catch((error) => {
                    console.error(error);
                    let message = "This verification link is invalid or has expired.";
                    if (error.code === 'auth/expired-action-code') {
                        message = "This link has expired. Please request a new verification email.";
                    } else if (error.code === 'auth/invalid-action-code') {
                        message = "This link is invalid. It may have already been used.";
                    }
                    container.innerHTML = `
                        <div class="error">
                            <div class="icon">✕</div>
                            <h1>Verification Failed</h1>
                            <p>${message}</p>
                            <a href="login.html" class="btn">Back to Login</a>
                        </div>
                    `;
                });
        } else {
            container.innerHTML = `
                <div class="error">
                    <div class="icon">✕</div>
                    <h1>Invalid Link</h1>
                    <p>No verification code found. Please use the link from your email.</p>
                    <a href="login.html" class="btn">Back to Login</a>
                </div>
            `;
        }
    </script>
</body>
</html>
