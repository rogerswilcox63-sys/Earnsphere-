<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5803688718527724" crossorigin="anonymous"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCVExwvLDwVmMJ6XbyTCrY1IyMqyhiuLbo",
        authDomain: "earnspherehub-742e9.firebaseapp.com",
        projectId: "earnspherehub-742e9",
        storageBucket: "earnspherehub-742e9.firebasestorage.app",
        messagingSenderId: "173538573377",

      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Survey - Earn Sphere</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a; color: #fff; padding: 20px; min-height: 100vh;
        }
        .container {max-width: 500px; margin: 0 auto;}
        .back {
            color: #94a3b8; text-decoration: none; display: inline-flex; 
            align-items: center; gap: .5rem; margin-bottom: 1rem; font-weight: 600;
        }
        .back:hover {color: #fff;}
        .header {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 1.5rem; border-radius: 16px; margin-bottom: 1.5rem;
            border: 1px solid #334155; text-align: center;
        }
        .badge {
            display: inline-block; background: #8b5cf6; color: #fff;
            padding: .3rem .8rem; border-radius: 20px; font-size: .8rem;
            font-weight: 700; margin-bottom: .8rem;
        }
        .header h1 {font-size: 1.5rem; margin-bottom: .5rem;}
        .header p {color: #94a3b8; margin-bottom: 1rem;}
        .reward {
            color: #10b981; font-weight: 700; font-size: 1.3rem;
            display: flex; align-items: center; justify-content: center; gap: .5rem;
        }
        .form-card {
            background: #1e293b; padding: 1.5rem; border-radius: 16px;
            border: 1px solid #334155;
        }
        label {
            display: block; margin: 1.2rem 0 .5rem; font-weight: 600; 
            color: #cbd5e1; font-size: .95rem;
        }
        input, select, textarea {
            width: 100%; padding: .9rem; border-radius: 10px;
            border: 1px solid #334155; background: #0f172a; color: #fff;
            font-size: 1rem; transition: border .2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: #3b82f6;
        }
        .start-btn {
            width: 100%; background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff; border: none; padding: 1rem; border-radius: 14px;
            font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 1.5rem;
            transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .start-btn:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            transform: translateY(-2px);
        }
        .start-btn:disabled { background: #4b5563; cursor: not-allowed; transform: none; }
        .message { padding: 1rem; border-radius: 0.75rem; margin-bottom: 1.5rem; font-size: 0.9rem; text-align: center; font-weight: 500; }
        .message.error { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }
        .note { text-align: center; color: #64748b; font-size: .85rem; margin-top: 1rem; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="container">
        <a href="dashboard.html" class="back">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
        
        <div class="header">
            <span class="badge" id="surveyBadge">Loading...</span>
            <h1 id="surveyTitle">Loading Survey...</h1>
            <p id="surveyDesc">Please wait while configuration loads.</p>
            <div class="reward" id="surveyReward">
                <i class="fas fa-coins"></i> ₦0 Reward
            </div>
        </div>

        <form class="form-card" id="dynamicSurveyForm">
            <div id="statusMessage"></div>
            
            <div id="questionsContainer"></div>

            <label>Confirm Contact Location</label>
            <input type="text" id="userLocation" placeholder="e.g. Lagos, Nigeria" required>

            <label>Your phone number for confirmation</label>
            <input type="tel" id="userPhone" placeholder="08012345678" pattern="[0-9]{11}" required>

            <button type="submit" class="start-btn" id="submitBtn" disabled>
                <i class="fas fa-paper-plane"></i> Submit & Claim Reward
            </button>
            
            <p class="note">
                By submitting, you confirm answers are accurate. Reward credits instantly to your wallet.
            </p>
        </form>
    </div>

    <script>
        // 1. SYSTEM MASTER DATABASE POOL (All 12 Platform Surveys Mapping Matrix)
        const surveyDatabase = {
            "srv_01": {
                title: "Social Media Usage", category: "Tech", reward: 150, desc: "Tell us about your screen time habits",
                questions: [
                    { id: "q1", text: "Which app do you spend the most time on?", type: "select", options: ["TikTok", "Instagram", "X (Twitter)", "Facebook", "YouTube"] },
                    { id: "q2", text: "How many hours a day do you spend on social media?", type: "select", options: ["Under 1 hour", "1-3 hours", "3-5 hours", "Over 5 hours"] }
                ]
            },
            "srv_02": {
                title: "Crypto Knowledge Check", category: "Finance", reward: 250, desc: "Your insights on digital assets",
                questions: [
                    { id: "q1", text: "Do you currently own any cryptocurrency?", type: "select", options: ["Yes, heavily invested", "Yes, a tiny amount", "No, but planning to", "No, and not interested"] },
                    { id: "q2", text: "Which network asset do you trust most?", type: "select", options: ["Bitcoin (BTC)", "Ethereum (ETH)", "USDT / Stablecoins", "Solana (SOL)", "None"] }
                ]
            },
            "srv_03": {
                title: "Fast Food Preferences", category: "Lifestyle", reward: 120, desc: "Help food brands structure logistics",
                questions: [
                    { id: "q1", text: "What is your favorite local fast food meal?", type: "select", options: ["Fried Rice & Chicken", "Burgers/Shawarma", "Pizza", "Amala / Local Dishes", "Other"] },
                    { id: "q2", text: "How often do you order food delivery weekly?", type: "select", options: ["Never", "Once a week", "2-4 times a week", "Every day"] }
                ]
            },
            "srv_04": {
                title: "Mobile Network Quality", category: "Telecom", reward: 200, desc: "Rate data stability in Nigeria",
                questions: [
                    { id: "q1", text: "Which network provider has the fastest data in your area?", type: "select", options: ["MTN", "Airtel", "Glo", "9mobile", "Starlink/Fiber"] },
                    { id: "q2", text: "What is your biggest issue with your current network?", type: "select", options: ["High cost of data", "Frequent network drops", "Poor customer care", "Slow upload speeds"] }
                ]
            },
            "srv_05": {
                title: "Streaming Services Study", category: "Entertainment", reward: 180, desc: "Where do you watch movies?",
                questions: [
                    { id: "q1", text: "What is your primary streaming account setup?", type: "select", options: ["Netflix", "Prime Video", "Showmax", "YouTube Premium", "I download free files"] },
                    { id: "q2", text: "What content format do you stream most?", type: "select", options: ["Nollywood Movies", "Hollywood Series", "Anime / Cartoons", "Live Sports"] }
                ]
            },
            "srv_06": {
                title: "Student Device Survey", category: "Education", reward: 160, desc: "Tools used for your learning tracks",
                questions: [
                    { id: "q1", text: "What hardware tool do you use for school tasks?", type: "select", options: ["Android Phone", "iPhone", "Windows Laptop", "MacBook / Tablet"] },
                    { id: "q2", text: "Have you used AI tools (like Gemini/ChatGPT) for assignments?", type: "select", options: ["Yes, constantly", "Sometimes for ideas", "Rarely", "Never"] }
                ]
            },
            "srv_07": {
                title: "Banking & Fintech Apps", category: "Finance", reward: 220, desc: "Rate your digital wallet experience",
                questions: [
                    { id: "q1", text: "Which platform do you use for fast transfers?", type: "select", options: ["Opay", "PalmPay", "Kuda", "Traditional Bank App (GTB, Access)", "Moniepoint"] },
                    { id: "q2", text: "What feature matters most to you in a banking app?", type: "select", options: ["Zero transfer fees", "100% network uptime", "Cashback rewards", "Loan availability"] }
                ]
            },
            "srv_08": {
                title: "Fashion & Shopping Habits", category: "E-Commerce", reward: 140, desc: "Where do you buy your wear?",
                questions: [
                    { id: "q1", text: "Where do you purchase your clothes most often?", type: "select", options: ["Instagram vendors", "Physical boutique", "Open markets (Balogun, Yaba)", "Jumia / International sites"] },
                    { id: "q2", text: "What drives your purchasing decisions most?", type: "select", options: ["Low prices/Discounts", "Brand name status", "Material durability", "Influencer reviews"] }
                ]
            },
            "srv_09": {
                title: "Gaming & Esports Habits", category: "Gaming", reward: 170, desc: "Let's track local mobile gaming data",
                questions: [
                    { id: "q1", text: "What platform do you play games on?", type: "select", options: ["Mobile phone", "PlayStation console", "Xbox console", "Gaming PC", "Not a gamer"] },
                    { id: "q2", text: "What genre of game do you play most?", type: "select", options: ["CODM / PUBG Mobile", "FIFA / EFootball", "Grand Theft Auto", "Candy Crush / Puzzles"] }
                ]
            },
            "srv_10": {
                title: "Sport Betting Insights", category: "Lifestyle", reward: 200, desc: "Analyzing sports gaming data footprints",
                questions: [
                    { id: "q1", text: "Which sport booking interface do you visit most?", type: "select", options: ["SportyBet", "Bet9ja", "1xBet", "BetKing", "I do not bet"] },
                    { id: "q2", text: "What sport parameters do you wager on primarily?", type: "select", options: ["Football leagues", "Virtual games", "Basketball / NBA", "Aviator / Casino games"] }
                ]
            },
            "srv_11": {
                title: "Ride Hailing Safety Check", category: "Transport", reward: 180, desc: "Share your ride-hailing experience",
                questions: [
                    { id: "q1", text: "Which ride-hailing app do you use most?", type: "select", options: ["Bolt", "Uber", "InDrive", "Rida", "LagRide", "Don't use apps"] },
                    { id: "q2", text: "Biggest issue with ride-hailing apps?", type: "select", options: ["High prices/surge", "Driver cancellations", "Safety concerns", "Dirty/old cars", "None"] }
                ]
            },
            "srv_12": {
                title: "Fitness & Wellness Routine", category: "Health", reward: 150, desc: "Track health and supplement data metrics",
                questions: [
                    { id: "q1", text: "How often do you exercise intentionally every week?", type: "select", options: ["Every day", "3-4 times a week", "Once a week", "Rarely / Never"] },
                    { id: "q2", text: "Do you buy fitness supplements or energy drinks?", type: "select", options: ["Yes, regularly", "Only energy drinks", "Occasionally", "Never"] }
                ]
            }
        };

        // 2. EXTRACT ACTIVE URL ROUTE ID PARAMETER
        const urlParams = new URLSearchParams(window.location.search);
        const currentSurveyId = urlParams.get('id') || "srv_01"; // Fallbacks cleanly to srv_01 if blank
        const selectedSurvey = surveyDatabase[currentSurveyId];

        const dynamicForm = document.getElementById('dynamicSurveyForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        // 3. RENDER GENERATED INTERFACE DOM SCHEMAS
        if (selectedSurvey) {
            document.getElementById('surveyBadge').innerText = selectedSurvey.category;
            document.getElementById('surveyTitle').innerText = selectedSurvey.title;
            document.getElementById('surveyDesc').innerText = selectedSurvey.desc;
            document.getElementById('surveyReward').innerHTML = `<i class="fas fa-coins"></i> ₦${selectedSurvey.reward} Reward`;
            
            const targetContainer = document.getElementById('questionsContainer');
            selectedSurvey.questions.forEach((q, index) => {
                const labelElement = document.createElement('label');
                labelElement.innerText = `${index + 1}. ${q.text}`;
                
                const selectElement = document.createElement('select');
                selectElement.id = `dyn_${q.id}`;
                selectElement.required = true;
                
                let markupHTML = `<option value="">Select option...</option>`;
                q.options.forEach(opt => {
                    markupHTML += `<option value="${opt}">${opt}</option>`;
                });
                
                selectElement.innerHTML = markupHTML;
                targetContainer.appendChild(labelElement);
                targetContainer.appendChild(selectElement);
            });
            
            submitBtn.disabled = false;
        } else {
            statusMessage.innerHTML = `<div class="message error">Requested task configuration signature is invalid.</div>`;
        }

        // 4. TRANSACTION ENGINE BLOCK FOR CREDITING WALLETS SECURELY
        let localUserData = JSON.parse(localStorage.getItem('currentUser'));
        
        auth.onAuthStateChanged((user) => {
            if (!user && !localUserData) window.location.href = 'login.html';
        });

        dynamicForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Loading ₦${selectedSurvey.reward}...`;

            // Compile answers dynamically
            const collectedAnswers = {};
            selectedSurvey.questions.forEach(q => {
                collectedAnswers[q.id] = document.getElementById(`dyn_${q.id}`).value;
            });
            collectedAnswers["location"] = document.getElementById('userLocation').value.trim();
            collectedAnswers["phone"] = document.getElementById('userPhone').value.trim();

            const firebaseUser = auth.currentUser;

            if (firebaseUser) {
                try {
                    const userRef = db.collection('users').doc(firebaseUser.uid);
                    const responseRef = db.collection('survey_responses').doc();

                    await db.runTransaction(async (transaction) => {
                        const userDoc = await transaction.get(userRef);
                        if (!userDoc.exists) throw "Profile context empty!";

                        const userData = userDoc.data();
                        let completedTasks = userData.completedTaskIds || [];

                        if (completedTasks.includes(currentSurveyId)) {
                            throw "You have already completed this survey track!";
                        }

                        const currentBalance = parseFloat(userData.balance) || 0;
                        const taskCount = parseInt(userData.successfulTaskCount) || 0;

                        transaction.set(responseRef, {
                            responseId: responseRef.id,
                            uid: firebaseUser.uid,
                            email: firebaseUser.email,
                            surveyId: currentSurveyId,
                            surveyName: selectedSurvey.title,
                            answers: collectedAnswers,
                            submittedAt: new Date().toISOString()
                        });

                        transaction.update(userRef, {
                            balance: currentBalance + selectedSurvey.reward,
                            successfulTaskCount: taskCount + 1,
                            completedTaskIds: firebase.firestore.FieldValue.arrayUnion(currentSurveyId)
                        });
                    });

                    window.location.href = `dashboard.html?completed=${currentSurveyId}`;

                } catch (err) {
                    console.error(err);
                    statusMessage.innerHTML = `<div class="message error"><i class="fas fa-times-circle"></i> Error: ${err}</div>`;
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `<i class="fas fa-paper-plane"></i> Submit & Claim Reward`;
                }
            } else {
                // Local Environment Fallback
                let localBal = parseFloat(localStorage.getItem('walletBalance')) || 0;
                let localTasks = parseInt(localStorage.getItem('successfulTaskCount')) || 0;

                localStorage.setItem('walletBalance', localBal + selectedSurvey.reward);
                localStorage.setItem('successfulTaskCount', localTasks + 1);

                if (localUserData) {
                    if (!localUserData.completedTaskIds) localUserData.completedTaskIds = [];
                    localUserData.completedTaskIds.push(currentSurveyId);
                    localUserData.balance = localBal + selectedSurvey.reward;
                    localUserData.successfulTaskCount = localTasks + 1;
                    localStorage.setItem('currentUser', JSON.stringify(localUserData));
                }

                window.location.href = `dashboard.html?completed=${currentSurveyId}`;
            }
        });
    </script>
</body>
</html>
